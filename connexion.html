<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | DropExpress</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #000; color: #fff; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .auth-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 2.5rem; padding: 2.5rem; width: 100%; max-width: 400px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        input { background: #111 !important; border: 1px solid #222 !important; color: white !important; width: 100%; padding: 15px; border-radius: 14px; margin-bottom: 12px; outline: none; transition: 0.3s; font-size: 16px; }
        input:focus { border-color: #2563eb !important; }
        .btn-blue { background: #2563eb; width: 100%; padding: 16px; border-radius: 14px; font-weight: 800; text-transform: uppercase; font-size: 12px; letter-spacing: 1px; transition: 0.3s; margin-top: 10px; cursor: pointer; border: none; color: white; }
        .btn-blue:disabled { background: #1e3a8a; opacity: 0.7; }
        .btn-google { background: #fff; color: #000; width: 100%; padding: 12px; border-radius: 14px; font-weight: 700; font-size: 11px; text-transform: uppercase; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="text-center mb-10">
            <h1 class="text-2xl font-black italic uppercase tracking-tighter mb-2">DROP<span class="text-blue-500">EXPRESS</span></h1>
            <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Connexion Utilisateur</p>
        </div>

        <div id="login-form">
            <input type="email" id="email" placeholder="Email" autocomplete="email">
            <input type="password" id="password" placeholder="Mot de passe" autocomplete="current-password">
            
            <button onclick="loginEmail()" id="btn-login" class="btn-blue">Se connecter</button>

            <div class="relative my-8">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-white/5"></div></div>
                <div class="relative flex justify-center text-[10px] uppercase font-bold"><span class="bg-[#0a0a0a] px-4 text-gray-600">Ou</span></div>
            </div>

            <button onclick="loginGoogle()" class="btn-google">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" alt="Google">
                Continuer avec Google
            </button>

            <p class="text-center mt-8 text-[11px] font-medium text-gray-500 uppercase tracking-tight">
                Nouveau ici ? 
                <a href="inscription.html" class="text-blue-500 font-black ml-1">Créer un compte</a>
            </p>
            
            <a href="index.html" class="block text-center mt-4 text-[9px] font-bold text-gray-700 uppercase tracking-widest hover:text-white transition">← Retour à la boutique</a>
        </div>
    </div>

    <script type="module">
        // Importation directe depuis les serveurs Google pour éviter les erreurs de modules locaux
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Configuration manuelle pour éviter le 404 sur init.json
        const firebaseConfig = {
            apiKey: "AIzaSyAs_xRDDAUjh_AemBZFBDCKQ9QXTNWuJ00",
            authDomain: "dropexpress-ba171.firebaseapp.com",
            projectId: "dropexpress-ba171",
            storageBucket: "dropexpress-ba171.firebasestorage.app",
            appId: "1:1070163070918:web:2c3e26ad6ea0688cb4acc7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // Fonction Connexion Email
        window.loginEmail = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const btn = document.getElementById('btn-login');

            if (!email || !pass) return alert("Veuillez remplir tous les champs.");

            btn.innerText = "CHARGEMENT...";
            btn.disabled = true;

            try {
                await signInWithEmailAndPassword(auth, email, pass);
                window.location.href = "index.html";
            } catch (error) {
                console.error(error);
                alert("Erreur : Email ou mot de passe incorrect.");
                btn.innerText = "SE CONNECTER";
                btn.disabled = false;
            }
        };

        // Fonction Connexion Google
        window.loginGoogle = async () => {
            try {
                await signInWithPopup(auth, provider);
                window.location.href = "index.html";
            } catch (error) {
                console.error(error);
                if (error.code !== 'auth/popup-closed-by-user') {
                    alert("Erreur de connexion avec Google.");
                }
            }
        };
    </script>
</body>
</html>
