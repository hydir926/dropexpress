<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | DropExpress</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; }
        input { background: #111 !important; border: 1px solid #222 !important; color: white !important; width: 100%; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">
    <div class="max-w-md w-full bg-[#0a0a0a] p-8 rounded-[2rem] border border-white/5 shadow-2xl">
        <h1 class="text-3xl font-black italic mb-2 text-center uppercase">DROP<span class="text-blue-500">EXPRESS</span></h1>
        <p class="text-gray-500 text-center mb-8 text-xs font-bold uppercase">Connexion</p>
        <form id="login-form">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="pass" placeholder="Mot de passe" required>
            <button type="submit" class="w-full bg-blue-600 py-4 rounded-xl font-bold transition">Se connecter</button>
        </form>
        <div class="flex items-center my-6"><div class="flex-grow border-t border-white/10"></div><span class="mx-4 text-xs text-gray-600">OU</span><div class="flex-grow border-t border-white/10"></div></div>
        <button id="google-btn" class="w-full bg-white text-black py-4 rounded-xl font-bold flex items-center justify-center gap-2">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5"> Google
        </button>
        <p class="text-center mt-6 text-sm text-gray-500">Pas de compte ? <a href="inscription.html" class="text-blue-500 font-bold">S'inscrire</a></p>
    </div>
    <script type="module">
        import { auth, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "./firebase.js";
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value);
                window.location.href = "index.html";
            } catch (e) { alert(e.message); }
        });
        document.getElementById('google-btn').onclick = async () => {
            try {
                await signInWithPopup(auth, new GoogleAuthProvider());
                window.location.href = "index.html";
            } catch (e) { alert(e.message); }
        };
    </script>
</body>
</html>
