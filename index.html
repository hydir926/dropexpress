<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DropExpress | Boutique</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.paypal.com/sdk/js?client-id=sb&currency=EUR"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; }
        .cart-sidebar { position: fixed; right: 0; top: 0; height: 100%; width: 100%; max-width: 450px; background: #0a0a0a; transform: translateX(100%); transition: 0.4s; z-index: 1000; border-left: 1px solid #1a1a1a; display: flex; flex-direction: column; overflow-y: auto; }
        .cart-open { transform: translateX(0); }
        input { background: #111 !important; border: 1px solid #222 !important; color: white !important; width: 100%; padding: 12px; border-radius: 12px; }
        #paypal-button-container { min-height: 150px; overflow: visible !important; }
    </style>
</head>
<body>
    <nav class="p-5 border-b border-white/10 flex justify-between items-center sticky top-0 bg-black/80 backdrop-blur-md z-50">
        <span class="text-2xl font-black italic">DROP<span class="text-blue-500">EXPRESS</span></span>
        <div class="flex gap-4">
            <a href="connexion.html" id="auth-link" class="text-sm font-bold border border-white/10 px-4 py-2 rounded-full">Connexion</a>
            <button onclick="toggleCart()" class="bg-blue-600 px-6 py-2 rounded-full font-bold">🛒 (<span id="cart-count">0</span>)</button>
        </div>
    </nav>

    <div id="cart-sidebar" class="cart-sidebar">
        <div class="p-6 border-b border-white/10 flex justify-between items-center">
            <h2 class="text-xl font-bold">Mon Panier</h2>
            <button onclick="toggleCart()" class="text-3xl">&times;</button>
        </div>
        <div id="cart-items" class="p-6 space-y-4"></div>
        <div class="p-6 bg-[#050505] space-y-3">
            <p class="text-blue-500 text-[10px] font-bold uppercase">Livraison</p>
            <input type="text" id="cust-name" placeholder="Nom complet">
            <input type="email" id="cust-email" placeholder="Email">
            <input type="tel" id="cust-phone" placeholder="Numéro de téléphone">
            <input type="text" id="cust-address" placeholder="Adresse complète">
        </div>
        <div class="p-6 border-t border-white/10">
            <div class="flex justify-between text-xl font-bold mb-4"><span>Total</span><span id="cart-total">0.00 €</span></div>
            <div id="paypal-button-container"></div>
        </div>
    </div>

    <main class="max-w-7xl mx-auto p-6 grid grid-cols-1 md:grid-cols-3 gap-8" id="product-grid"></main>

    <script type="module">
        import { db, collection, getDocs, addDoc, auth, onAuthStateChanged, signOut } from "./firebase.js";
        let cart = [];
        window.toggleCart = () => document.getElementById('cart-sidebar').classList.toggle('cart-open');

        // Gestion de l'affichage utilisateur connecté
        onAuthStateChanged(auth, user => {
            const link = document.getElementById('auth-link');
            if(user) {
                link.innerText = "Déconnexion";
                link.onclick = () => signOut(auth);
                document.getElementById('cust-email').value = user.email;
            }
        });

        window.addToCart = (name, price) => {
            cart.push({ name, price });
            updateCart();
            toggleCart();
        };

        function updateCart() {
            const container = document.getElementById('cart-items');
            let total = 0;
            container.innerHTML = "";
            cart.forEach(item => {
                total += item.price;
                container.innerHTML += `<div class="flex justify-between bg-white/5 p-3 rounded-xl border border-white/5"><span>${item.name}</span><span class="text-blue-500 font-bold">${item.price}€</span></div>`;
            });
            document.getElementById('cart-total').innerText = total.toFixed(2) + " €";
            document.getElementById('cart-count').innerText = cart.length;
            if(total > 0) initPayPal(total.toFixed(2));
        }

        function initPayPal(totalPrice) {
            document.getElementById('paypal-button-container').innerHTML = "";
            paypal.Buttons({
                onClick: (data, actions) => {
                    if(!document.getElementById('cust-name').value || !document.getElementById('cust-address').value || !document.getElementById('cust-phone').value) {
                        alert("Veuillez remplir les informations de livraison.");
                        return actions.reject();
                    }
                    return actions.resolve();
                },
                createOrder: (data, actions) => actions.order.create({ purchase_units: [{ amount: { value: totalPrice } }] }),
                onApprove: async (data, actions) => {
                    await actions.order.capture();
                    await addDoc(collection(db, "orders"), {
                        client: document.getElementById('cust-name').value,
                        email: document.getElementById('cust-email').value,
                        telephone: document.getElementById('cust-phone').value,
                        adresse: document.getElementById('cust-address').value,
                        articles: cart,
                        total: totalPrice + " €",
                        date: new Date().toISOString()
                    });
                    alert("Commande réussie !");
                    cart = []; updateCart(); toggleCart();
                }
            }).render('#paypal-button-container');
        }

        const snap = await getDocs(collection(db, "products"));
        snap.forEach(doc => {
            const p = doc.data();
            document.getElementById('product-grid').innerHTML += `
                <div class="bg-[#0a0a0a] p-6 rounded-[2rem] border border-white/5 text-center">
                    <img src="${p.image}" class="w-full h-64 object-cover rounded-3xl mb-4">
                    <h3 class="text-xl font-bold">${p.name}</h3>
                    <p class="text-blue-500 text-2xl font-black mt-2">${p.price}€</p>
                    <button onclick="addToCart('${p.name}', ${p.price})" class="mt-4 bg-white text-black w-full py-3 rounded-xl font-bold">Ajouter au panier</button>
                </div>`;
        });
    </script>
</body>
</html>
