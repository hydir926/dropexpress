
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DropExpress | Boutique Moderne</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <nav class="flex justify-between items-center p-6 bg-white shadow-sm sticky top-0 z-50">
        <h1 class="text-2xl font-black tracking-tighter">DROPEXPRESS</h1>
        <button class="bg-black text-white px-5 py-2 rounded-full text-sm font-bold">
            Panier (0)
        </button>
    </nav>

    <header class="p-8 md:p-16 text-center">
        <h2 class="text-5xl md:text-7xl font-black mb-4 tracking-tight">VITESSE. STYLE. EXCLUSIVITÉ.</h2>
        <p class="text-gray-500 text-lg">La nouvelle ère du dropshipping est ici.</p>
    </header>

    <main class="max-w-7xl mx-auto p-6">
        <div id="product-grid" class="grid grid-cols-1 md:grid-cols-3 gap-10">
            <p class="text-center col-span-full py-10 text-gray-400">Chargement des produits...</p>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // ⚠️ REMPLACE AVEC TES CLÉS FIREBASE ICI
        const firebaseConfig = {
            apiKey: "TON_API_KEY",
            authDomain: "ton-projet.firebaseapp.com",
            projectId: "ton-projet-id",
            storageBucket: "ton-projet.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abcdef"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const productGrid = document.getElementById('product-grid');

        // Fonction pour afficher les produits
        async function loadProducts() {
            const querySnapshot = await getDocs(collection(db, "products"));
            productGrid.innerHTML = ""; // On vide le message de chargement

            querySnapshot.forEach((doc) => {
                const p = doc.data();
                productGrid.innerHTML += `
                    <div class="group">
                        <div class="aspect-[4/5] bg-gray-200 rounded-3xl overflow-hidden mb-4 relative">
                            <img src="${p.image}" class="w-full h-full object-cover group-hover:scale-105 transition duration-500">
                            <button class="absolute bottom-4 right-4 bg-white p-3 rounded-full shadow-lg opacity-0 group-hover:opacity-100 transition">
                                ➕
                            </button>
                        </div>
                        <h3 class="font-bold text-xl">${p.name}</h3>
                        <p class="text-gray-500">${p.price} €</p>
                    </div>
                `;
            });
        }

        loadProducts();
    </script>
</body>
</html>
