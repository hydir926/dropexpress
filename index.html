<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DropExpress | Boutique</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://www.paypal.com/sdk/js?client-id=sb&currency=EUR"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #000; color: #fff; margin: 0; overflow-x: hidden; }
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
        @media (min-width: 768px) { .product-grid { grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 40px; } }
        .product-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 1.5rem; padding: 12px; display: flex; flex-direction: column; height: 100%; position: relative; }
        .product-img { width: 100%; height: 140px; object-fit: cover; border-radius: 1rem; margin-bottom: 10px; }
        
        /* Gestion du texte coupé */
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        .cart-sidebar { position: fixed; right: 0; top: 0; height: 100%; width: 100%; max-width: 400px; background: #0a0a0a; transform: translateX(100%); transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; border-left: 1px solid #1a1a1a; }
        .cart-open { transform: translateX(0); }
        .category-btn { background: #111; border: 1px solid #222; color: #666; padding: 8px 16px; border-radius: 50px; font-size: 10px; font-weight: 800; text-transform: uppercase; transition: 0.3s; white-space: nowrap; }
        .category-btn.active { background: #2563eb; border-color: #2563eb; color: white; }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-50 bg-black/80 backdrop-blur-xl border-b border-white/5 py-4 px-5 flex justify-between items-center">
        <span class="text-lg font-black italic uppercase tracking-tighter">DROP<span class="text-blue-500">EXPRESS</span></span>
        <div class="flex items-center gap-2">
            <div id="auth-status"><a href="connexion.html" class="text-[9px] font-black uppercase border border-white/20 px-3 py-2 rounded-full">Connexion</a></div>
            <button onclick="toggleCart()" class="bg-blue-600 text-white px-3 py-2 rounded-full font-bold text-[10px] flex items-center gap-1">
                <span id="cart-count">0</span> 🛒
            </button>
        </div>
    </nav>

    <header class="pt-10 pb-6 text-center px-4">
        <h1 class="text-3xl font-black mb-6 uppercase italic text-blue-500">BOUTIQUE</h1>
        <div class="max-w-md mx-auto mb-6 px-4">
            <input type="text" id="search-input" oninput="filterProducts()" placeholder="Rechercher..." class="w-full bg-[#111] border border-white/10 rounded-xl px-5 py-3 text-sm outline-none">
        </div>
        <div class="flex gap-2 overflow-x-auto pb-4 px-4 no-scrollbar">
            <button class="category-btn active" onclick="setCategory('all', this)">Tous</button>
            <button class="category-btn" onclick="setCategory('High-Tech', this)">High-Tech</button>
            <button class="category-btn" onclick="setCategory('Déco', this)">Déco</button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto">
        <div class="product-grid" id="product-grid"></div>
    </main>

    <section class="py-10 px-6 border-t border-white/5 mt-10 text-center">
        <h2 class="text-sm font-black uppercase text-blue-500 mb-6 italic">Avis Clients ⭐⭐⭐⭐⭐</h2>
        <p class="text-[10px] text-gray-500 italic">"Livraison rapide et conforme !" - Alexandre K.</p>
    </section>

    <div id="cart-sidebar" class="cart-sidebar flex flex-col">
        <div class="p-6 border-b border-white/5 flex justify-between items-center">
            <h2 class="text-lg font-black uppercase">Panier</h2>
            <button onclick="toggleCart()" class="text-3xl">&times;</button>
        </div>
        <div id="cart-items" class="p-4 flex-1 overflow-y-auto"></div>
        <div class="p-6 border-t border-white/5"><div id="paypal-button-container"></div></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { initializeFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAs_xRDDAUjh_AemBZFBDCKQ9QXTNWuJ00", authDomain: "dropexpress-ba171.firebaseapp.com", projectId: "dropexpress-ba171", storageBucket: "dropexpress-ba171.firebasestorage.app", appId: "1:1070163070918:web:2c3e26ad6ea0688cb4acc7" };
        const app = initializeApp(firebaseConfig);
        const db = initializeFirestore(app, { experimentalForceLongPolling: true });

        let allProducts = [];
        let currentCategory = 'all';

        window.setCategory = (cat, btn) => {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentCategory = cat;
            renderProducts();
        };

        // FONCTION POUR AFFICHER / CACHER LE TEXTE
        window.toggleDesc = (id) => {
            const p = document.getElementById(`desc-${id}`);
            const btn = document.getElementById(`btn-${id}`);
            if (p.classList.contains('line-clamp-2')) {
                p.classList.remove('line-clamp-2');
                btn.innerText = "Réduire -";
            } else {
                p.classList.add('line-clamp-2');
                btn.innerText = "Lire plus +";
            }
        };

        function renderProducts() {
            const grid = document.getElementById('product-grid');
            const search = document.getElementById('search-input').value.toLowerCase();
            grid.innerHTML = "";

            allProducts.filter(p => (currentCategory === 'all' || p.category === currentCategory) && p.name.toLowerCase().includes(search))
            .forEach(p => {
                const desc = p.description || "Aucune description.";
                grid.innerHTML += `
                    <div class="product-card">
                        <div class="absolute top-4 right-4 bg-red-600 text-[7px] font-black px-2 py-1 rounded uppercase">Stock limité</div>
                        <img src="${p.mainImage || p.image}" class="product-img">
                        <h3 class="text-[10px] font-extrabold uppercase mb-1 line-clamp-1">${p.name}</h3>
                        
                        <div class="mb-2">
                            <p id="desc-${p.id}" class="text-gray-500 text-[8.5px] leading-tight line-clamp-2">${desc}</p>
                            ${desc.length > 50 ? `<button onclick="toggleDesc('${p.id}')" id="btn-${p.id}" class="text-blue-500 text-[8px] font-black uppercase mt-1">Lire plus +</button>` : ""}
                        </div>

                        <div class="mt-auto flex flex-col gap-2">
                            <span class="text-sm font-black text-blue-500">${p.price}€</span>
                            <button onclick="addToCart('${p.name.replace(/'/g, "\\'")}', ${p.price})" class="bg-white text-black py-2 rounded-lg font-black text-[9px] uppercase">ACHETER</button>
                        </div>
                    </div>`;
            });
        }

        onSnapshot(collection(db, "products"), snap => {
            allProducts = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderProducts();
        });

        window.filterProducts = () => renderProducts();

        let cart = [];
        window.toggleCart = () => document.getElementById('cart-sidebar').classList.toggle('cart-open');
        window.addToCart = (n, p) => { cart.push({n, p}); updateCart(); toggleCart(); };
        function updateCart() {
            document.getElementById('cart-count').innerText = cart.length;
            const container = document.getElementById('cart-items'); container.innerHTML = "";
            cart.forEach(i => container.innerHTML += `<div class="flex justify-between p-3 bg-white/5 rounded-xl mb-2 text-[10px]"><span>${i.n}</span><b>${i.p}€</b></div>`);
        }
    </script>
</body>
</html>
