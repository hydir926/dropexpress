<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DropExpress | Boutique</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://www.paypal.com/sdk/js?client-id=sb&currency=EUR"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #000; color: #fff; margin: 0; overflow-x: hidden; }
        .cart-sidebar { position: fixed; right: 0; top: 0; height: 100%; width: 100%; max-width: 400px; background: #0a0a0a; transform: translateX(100%); transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; border-left: 1px solid #1a1a1a; display: flex; flex-direction: column; }
        .cart-open { transform: translateX(0); box-shadow: -20px 0 50px rgba(0,0,0,0.9); }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .product-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 2rem; padding: 1.2rem; height: 100%; display: flex; flex-direction: column; }
        input { background: #111 !important; border: 1px solid #222 !important; color: white !important; width: 100%; padding: 14px; border-radius: 12px; margin-bottom: 10px; outline: none; }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-50 bg-black/80 backdrop-blur-xl border-b border-white/5 py-5 px-6 flex justify-between items-center">
        <span class="text-xl font-black italic uppercase tracking-tighter">DROP<span class="text-blue-500">EXPRESS</span></span>
        
        <div class="flex items-center gap-3">
            <div id="auth-status">
                <button onclick="toggleAuthModal()" class="text-[10px] font-black uppercase tracking-widest border border-white/20 px-4 py-2 rounded-full">Connexion</button>
            </div>
            <button onclick="toggleCart()" class="bg-blue-600 text-white px-4 py-2 rounded-full font-bold text-xs flex items-center gap-2 shadow-lg shadow-blue-600/20">
                <span class="text-sm">🛒</span> <span id="cart-count">0</span>
            </button>
        </div>
    </nav>

    <div id="auth-modal" class="modal">
        <div class="bg-[#0a0a0a] border border-white/10 p-8 rounded-[2.5rem] w-full max-w-sm relative">
            <button onclick="toggleAuthModal()" class="absolute top-5 right-6 text-2xl text-gray-500">&times;</button>
            <h2 id="auth-title" class="text-xl font-black italic mb-6 uppercase text-center">Connexion</h2>
            <input type="email" id="auth-email" placeholder="Email">
            <input type="password" id="auth-pass" placeholder="Mot de passe">
            <button onclick="handleAuth()" id="btn-auth-submit" class="w-full bg-blue-600 py-4 rounded-xl font-black uppercase text-xs tracking-widest mb-4">Valider</button>
            <p class="text-center text-[10px] text-gray-500 uppercase font-bold tracking-widest cursor-pointer" onclick="switchAuthMode()" id="auth-switch">Pas de compte ? S'inscrire</p>
        </div>
    </div>

    <section class="h-[40vh] flex items-center justify-center text-center px-6 bg-gradient-to-b from-blue-900/20 to-black">
        <div>
            <h1 class="text-6xl font-black mb-2 uppercase italic tracking-tighter">VOTRE <span class="text-blue-500">STYLE</span></h1>
            <p class="text-gray-400 font-bold uppercase tracking-[0.3em] text-[10px]">Exclusivités & Drops Limités</p>
        </div>
    </section>

    <section class="max-w-7xl mx-auto px-6 py-10">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="product-grid">
            <p class="text-center col-span-full text-gray-800 animate-pulse text-xs font-bold uppercase">Connexion au stock...</p>
        </div>
    </section>

    <div id="cart-sidebar" class="cart-sidebar">
        <div class="p-8 border-b border-white/5 flex justify-between items-center">
            <h2 class="text-xl font-black italic uppercase">Mon Panier</h2>
            <button onclick="toggleCart()" class="text-3xl">&times;</button>
        </div>
        <div id="cart-items" class="p-6 flex-1 overflow-y-auto"></div>
        <div class="p-8 bg-[#050505] border-t border-white/5">
            <input type="text" id="cust-name" placeholder="Nom Complet">
            <input type="tel" id="cust-phone" placeholder="Téléphone">
            <input type="text" id="cust-address" placeholder="Adresse complète">
            <div class="flex justify-between text-2xl font-black mb-6">
                <span class="text-sm uppercase text-gray-500 self-center">Total</span>
                <span id="cart-total" class="text-blue-500">0€</span>
            </div>
            <div id="paypal-button-container"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { initializeFirestore, collection, onSnapshot, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAs_xRDDAUjh_AemBZFBDCKQ9QXTNWuJ00",
            authDomain: "dropexpress-ba171.firebaseapp.com",
            projectId: "dropexpress-ba171",
            storageBucket: "dropexpress-ba171.firebasestorage.app",
            appId: "1:1070163070918:web:2c3e26ad6ea0688cb4acc7"
        };

        const app = initializeApp(firebaseConfig);
        const db = initializeFirestore(app, { experimentalForceLongPolling: true });
        const auth = getAuth(app);

        // --- AUTH LOGIC (MODAL) ---
        let isLoginMode = true;
        window.toggleAuthModal = () => {
            const m = document.getElementById('auth-modal');
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        };
        window.switchAuthMode = () => {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? "Connexion" : "Inscription";
            document.getElementById('auth-switch').innerText = isLoginMode ? "Pas de compte ? S'inscrire" : "Déjà un compte ? Se connecter";
        };
        window.handleAuth = async () => {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            try {
                if(isLoginMode) await signInWithEmailAndPassword(auth, email, pass);
                else await createUserWithEmailAndPassword(auth, email, pass);
                toggleAuthModal();
            } catch(e) { alert("Erreur: " + e.message); }
        };

        onAuthStateChanged(auth, (user) => {
            const box = document.getElementById('auth-status');
            if (user) box.innerHTML = `<button onclick="window.logout()" class="text-[9px] font-black uppercase tracking-widest bg-white text-black px-4 py-2 rounded-full">Déconnexion</button>`;
            else box.innerHTML = `<button onclick="toggleAuthModal()" class="text-[9px] font-black uppercase tracking-widest border border-white/20 px-4 py-2 rounded-full">Connexion</button>`;
        });
        window.logout = () => signOut(auth).then(() => location.reload());

        // --- PANIER & PRODUITS ---
        let cart = [];
        window.toggleCart = () => document.getElementById('cart-sidebar').classList.toggle('cart-open');
        window.addToCart = (name, price) => { cart.push({ name, price }); updateCart(); toggleCart(); };
        function updateCart() {
            const container = document.getElementById('cart-items');
            let total = 0; container.innerHTML = "";
            cart.forEach(item => { total += item.price; container.innerHTML += `<div class="flex justify-between bg-white/5 p-4 rounded-2xl mb-2 text-[10px] font-bold uppercase"><span>${item.name}</span><b class="text-blue-500">${item.price}€</b></div>`; });
            document.getElementById('cart-total').innerText = total + "€";
            document.getElementById('cart-count').innerText = cart.length;
            if(total > 0) initPayPal(total);
        }

        onSnapshot(collection(db, "products"), snap => {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = "";
            snap.forEach(doc => {
                const p = doc.data();
                const id = doc.id;
                const img = p.mainImage || (p.images && p.images[0]) || p.image || '';
                grid.innerHTML += `
                    <div class="product-card">
                        <img src="${img}" class="w-full h-72 object-cover rounded-[2rem] mb-4">
                        <h3 class="text-xl font-bold uppercase tracking-tighter">${p.name}</h3>
                        <p class="text-gray-500 text-xs italic flex-1 line-clamp-3 my-2">${p.description || ""}</p>
                        <div class="flex justify-between items-center mt-4 pt-4 border-t border-white/5">
                            <span class="text-2xl font-black text-blue-500">${p.price}€</span>
                            <button onclick="addToCart('${p.name.replace(/'/g, "\\'")}', ${p.price})" class="bg-white text-black px-6 py-2 rounded-xl font-black text-[10px] uppercase">Prendre</button>
                        </div>
                    </div>`;
            });
        });

        function initPayPal(total) {
            document.getElementById('paypal-button-container').innerHTML = "";
            paypal.Buttons({
                createOrder: (data, actions) => actions.order.create({ purchase_units: [{ amount: { value: total } }] }),
                onApprove: async (data, actions) => {
                    await actions.order.capture();
                    await addDoc(collection(db, "orders"), { client: document.getElementById('cust-name').value, articles: cart, total: total + "€", date: new Date().toISOString() });
                    alert("Payé !"); location.reload();
                }
            }).render('#paypal-button-container');
        }
    </script>
</body>
</html>
