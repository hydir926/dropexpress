<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DropExpress | Boutique</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://www.paypal.com/sdk/js?client-id=sb&currency=EUR"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #000; color: #fff; margin: 0; overflow-x: hidden; }
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
        @media (min-width: 768px) { .product-grid { grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 40px; } }
        .product-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 1.5rem; padding: 12px; display: flex; flex-direction: column; height: 100%; position: relative; }
        .product-img { width: 100%; height: 140px; object-fit: cover; border-radius: 1rem; margin-bottom: 10px; }
        .cart-sidebar { position: fixed; right: 0; top: 0; height: 100%; width: 100%; max-width: 400px; background: #0a0a0a; transform: translateX(100%); transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; border-left: 1px solid #1a1a1a; }
        .cart-open { transform: translateX(0); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-50 bg-black/80 backdrop-blur-xl border-b border-white/5 py-4 px-5 flex justify-between items-center">
        <span class="text-lg font-black italic uppercase">DROP<span class="text-blue-500">EXPRESS</span></span>
        <button onclick="toggleCart()" class="bg-blue-600 text-white px-4 py-2 rounded-full font-bold text-[10px] flex items-center gap-2">
            🛒 <span id="cart-count">0</span> ARTICLES
        </button>
    </nav>

    <main class="max-w-7xl mx-auto py-10">
        <div class="product-grid" id="product-grid"></div>
    </main>

    <div id="cart-sidebar" class="cart-sidebar flex flex-col shadow-2xl">
        <div class="p-6 border-b border-white/5 flex justify-between items-center">
            <h2 class="text-lg font-black uppercase italic">Mon Panier</h2>
            <button onclick="toggleCart()" class="text-3xl text-gray-500 hover:text-white">&times;</button>
        </div>

        <div id="cart-items" class="p-4 flex-1 overflow-y-auto no-scrollbar">
            <p id="empty-cart-msg" class="text-center text-gray-600 text-[10px] mt-10 uppercase font-bold tracking-widest">Votre panier est vide</p>
        </div>

        <div class="p-6 border-t border-white/5 bg-[#050505]">
            <div class="flex justify-between items-center mb-6">
                <span class="text-[10px] font-black uppercase text-gray-400">Total estimé :</span>
                <span id="cart-total" class="text-xl font-black text-blue-500">0.00€</span>
            </div>
            <div id="paypal-button-container"></div>
            <p class="text-[8px] text-center text-gray-600 mt-4 uppercase font-bold">Paiement 100% sécurisé via SSL</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { initializeFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAs_xRDDAUjh_AemBZFBDCKQ9QXTNWuJ00", authDomain: "dropexpress-ba171.firebaseapp.com", projectId: "dropexpress-ba171", storageBucket: "dropexpress-ba171.firebasestorage.app", appId: "1:1070163070918:web:2c3e26ad6ea0688cb4acc7" };
        const app = initializeApp(firebaseConfig);
        const db = initializeFirestore(app, { experimentalForceLongPolling: true });

        let allProducts = [];
        let cart = [];

        // CHARGEMENT PRODUITS
        onSnapshot(collection(db, "products"), snap => {
            allProducts = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderProducts();
        });

        function renderProducts() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = "";
            allProducts.forEach(p => {
                grid.innerHTML += `
                    <div class="product-card">
                        <img src="${p.mainImage || p.image}" class="product-img">
                        <h3 class="text-[10px] font-extrabold uppercase mb-2">${p.name}</h3>
                        <div class="mt-auto flex justify-between items-center">
                            <span class="text-sm font-black text-blue-500">${p.price}€</span>
                            <button onclick="addToCart('${p.id}', '${p.name.replace(/'/g, "\\'")}', ${p.price})" class="bg-white text-black px-4 py-2 rounded-lg font-black text-[9px] uppercase hover:bg-blue-500 hover:text-white transition">Ajouter</button>
                        </div>
                    </div>`;
            });
        }

        // LOGIQUE PANIER
        window.toggleCart = () => document.getElementById('cart-sidebar').classList.toggle('cart-open');

        window.addToCart = (id, name, price) => {
            cart.push({ id, name, price });
            updateCart();
            if(!document.getElementById('cart-sidebar').classList.contains('cart-open')) toggleCart();
        };

        window.removeFromCart = (index) => {
            cart.splice(index, 1);
            updateCart();
        };

        function updateCart() {
            const container = document.getElementById('cart-items');
            const count = document.getElementById('cart-count');
            const totalDisplay = document.getElementById('cart-total');
            
            count.innerText = cart.length;
            container.innerHTML = "";

            if (cart.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-600 text-[10px] mt-10 uppercase font-bold tracking-widest">Votre panier est vide</p>';
                totalDisplay.innerText = "0.00€";
                return;
            }

            let total = 0;
            cart.forEach((item, index) => {
                total += item.price;
                container.innerHTML += `
                    <div class="flex items-center justify-between p-3 bg-white/5 rounded-2xl mb-3 border border-white/5">
                        <div class="flex flex-col">
                            <span class="text-[9px] font-black uppercase text-white">${item.name}</span>
                            <span class="text-[9px] font-bold text-blue-500">${item.price}€</span>
                        </div>
                        <button onclick="removeFromCart(${index})" class="text-red-500 font-bold text-lg">&times;</button>
                    </div>`;
            });

            totalDisplay.innerText = total.toFixed(2) + "€";
            renderPayPal(total);
        }

        function renderPayPal(amount) {
            const container = document.getElementById('paypal-button-container');
            container.innerHTML = "";
            if (amount <= 0) return;

            paypal.Buttons({
                createOrder: (data, actions) => {
                    return actions.order.create({
                        purchase_units: [{ amount: { value: amount.toFixed(2) } }]
                    });
                },
                onApprove: (data, actions) => {
                    return actions.order.capture().then(details => {
                        alert('Merci pour votre commande ' + details.payer.name.given_name + ' !');
                        cart = [];
                        updateCart();
                        toggleCart();
                    });
                }
            }).render('#paypal-button-container');
        }
    </script>
</body>
</html>
