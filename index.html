<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DropExpress | Boutique Officielle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://www.paypal.com/sdk/js?client-id=sb&currency=EUR"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #000; color: #fff; margin: 0; overflow-x: hidden; }
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
        @media (min-width: 768px) { .product-grid { grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 40px; } }
        .product-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 1.5rem; padding: 12px; display: flex; flex-direction: column; height: 100%; }
        .product-img { width: 100%; height: 140px; object-fit: cover; border-radius: 1rem; margin-bottom: 10px; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .cart-sidebar { position: fixed; right: 0; top: 0; height: 100%; width: 100%; max-width: 400px; background: #0a0a0a; transform: translateX(100%); transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; border-left: 1px solid #1a1a1a; display: flex; flex-direction: column; }
        .cart-open { transform: translateX(0); }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-50 bg-black/80 backdrop-blur-xl border-b border-white/5 py-4 px-5 flex justify-between items-center">
        <span class="text-lg font-black italic uppercase tracking-tighter">DROP<span class="text-blue-500">EXPRESS</span></span>
        
        <div class="flex items-center gap-2">
            <div id="auth-status">
                <a href="connexion.html" class="text-[9px] font-black uppercase border border-white/20 px-3 py-2 rounded-full hover:bg-white hover:text-black transition">Connexion</a>
            </div>
            
            <button onclick="toggleCart()" class="bg-blue-600 text-white px-3 py-2 rounded-full font-bold text-[10px] flex items-center gap-1 shadow-lg shadow-blue-600/20">
                <span id="cart-count">0</span> 🛒
            </button>
        </div>
    </nav>

    <header class="py-10 text-center px-4">
        <h1 class="text-3xl font-black mb-1 uppercase italic leading-none">LE FUTUR DU <br> <span class="text-blue-500 italic">SHOPPING</span></h1>
        <p class="text-gray-500 font-bold uppercase tracking-widest text-[8px]">Articles exclusifs • Paiement sécurisé</p>
    </header>

    <main class="max-w-7xl mx-auto pb-20">
        <div class="product-grid" id="product-grid"></div>
    </main>

    <div id="cart-sidebar" class="cart-sidebar">
        <div class="p-6 border-b border-white/5 flex justify-between items-center">
            <h2 class="text-lg font-black italic uppercase">Mon Panier</h2>
            <button onclick="toggleCart()" class="text-3xl">&times;</button>
        </div>
        <div id="cart-items" class="p-4 flex-1 overflow-y-auto"></div>
        <div class="p-8 bg-[#050505] border-t border-white/5">
            <div class="flex justify-between text-xl font-black mb-6">
                <span class="text-[10px] uppercase text-gray-500 self-center">Total</span>
                <span id="cart-total" class="text-blue-500">0€</span>
            </div>
            <div id="paypal-button-container"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { initializeFirestore, collection, onSnapshot, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAs_xRDDAUjh_AemBZFBDCKQ9QXTNWuJ00",
            authDomain: "dropexpress-ba171.firebaseapp.com",
            projectId: "dropexpress-ba171",
            storageBucket: "dropexpress-ba171.firebasestorage.app",
            appId: "1:1070163070918:web:2c3e26ad6ea0688cb4acc7"
        };

        const app = initializeApp(firebaseConfig);
        const db = initializeFirestore(app, { experimentalForceLongPolling: true });
        const auth = getAuth(app);

        // --- GESTION CONNEXION ---
        onAuthStateChanged(auth, (user) => {
            const box = document.getElementById('auth-status');
            if (user) {
                box.innerHTML = `<button onclick="window.logout()" class="text-[8px] font-black uppercase bg-white text-black px-3 py-2 rounded-full">Déconnexion</button>`;
            } else {
                box.innerHTML = `<a href="connexion.html" class="text-[8px] font-black uppercase border border-white/20 px-3 py-2 rounded-full">Connexion</a>`;
            }
        });
        window.logout = () => signOut(auth).then(() => location.reload());

        let cart = [];
        window.toggleCart = () => document.getElementById('cart-sidebar').classList.toggle('cart-open');
        window.addToCart = (name, price) => { cart.push({ name, price }); updateCart(); toggleCart(); };

        function updateCart() {
            const container = document.getElementById('cart-items');
            let total = 0; container.innerHTML = "";
            cart.forEach(item => { 
                total += item.price; 
                container.innerHTML += `<div class="flex justify-between p-3 bg-white/5 rounded-xl mb-2 text-[10px]"><span>${item.name}</span><b class="text-blue-500">${item.price}€</b></div>`; 
            });
            document.getElementById('cart-total').innerText = total + "€";
            document.getElementById('cart-count').innerText = cart.length;
            if(total > 0) initPayPal(total);
        }

        // --- CHARGEMENT PRODUITS ---
        onSnapshot(collection(db, "products"), snap => {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = "";
            snap.forEach(doc => {
                const p = doc.data();
                const id = doc.id;
                const desc = p.description || "";

                grid.innerHTML += `
                    <div class="product-card">
                        <img src="${p.mainImage || p.image}" class="product-img">
                        <h3 class="text-[10px] font-extrabold uppercase text-white mb-1">${p.name}</h3>
                        
                        <div class="flex-1">
                            <p id="desc-${id}" class="text-gray-500 text-[8.5px] leading-tight line-clamp-2">${desc}</p>
                            ${desc.length > 50 ? `<button onclick="toggleText('${id}')" id="btn-${id}" class="text-blue-500 text-[8px] font-bold uppercase mt-1">Lire plus +</button>` : ""}
                        </div>

                        <div class="mt-3 flex flex-col gap-2">
                            <span class="text-sm font-black text-blue-500">${p.price}€</span>
                            <button onclick="addToCart('${p.name.replace(/'/g, "\\'")}', ${p.price})" class="bg-white text-black py-2 rounded-lg font-black text-[9px] uppercase active:scale-95 transition">Acheter</button>
                        </div>
                    </div>`;
            });
        });

        window.toggleText = (id) => {
            const p = document.getElementById(`desc-${id}`);
            const btn = document.getElementById(`btn-${id}`);
            if (p.classList.contains('line-clamp-2')) {
                p.classList.remove('line-clamp-2');
                btn.innerText = "Réduire -";
            } else {
                p.classList.add('line-clamp-2');
                btn.innerText = "Lire plus +";
            }
        };

        function initPayPal(total) {
            document.getElementById('paypal-button-container').innerHTML = "";
            paypal.Buttons({
                createOrder: (data, actions) => actions.order.create({ purchase_units: [{ amount: { value: total } }] }),
                onApprove: async (data, actions) => {
                    await actions.order.capture();
                    await addDoc(collection(db, "orders"), { total: total + "€", date: new Date().toISOString() });
                    alert("Payé !"); location.reload();
                }
            }).render('#paypal-button-container');
        }
    </script>
</body>
</html>
