<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DropExpress | Boutique Officielle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .product-card:hover img { transform: scale(1.05); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-6 h-16 flex justify-between items-center">
            <span class="text-xl font-extrabold tracking-tighter text-black italic">DROP<span class="text-blue-600">EXPRESS</span></span>
            <div class="flex items-center gap-4">
                <button class="relative p-2">
                    <span class="text-xl">🛒</span>
                    <span id="cart-count" class="absolute top-0 right-0 bg-blue-600 text-white text-[10px] font-bold px-1.5 rounded-full">0</span>
                </button>
            </div>
        </div>
    </nav>

    <header class="py-12 px-6 text-center max-w-4xl mx-auto">
        <h1 class="text-4xl md:text-6xl font-extrabold tracking-tight mb-4">Le futur du shopping <span class="text-blue-600">commence ici.</span></h1>
        <p class="text-slate-500 text-lg">Découvrez notre sélection exclusive de produits premium expédiés en un temps record.</p>
    </header>

    <main class="max-w-7xl mx-auto px-6 pb-20">
        <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="col-span-full text-center py-20">
                <div class="animate-spin inline-block w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full mb-4"></div>
                <p class="text-slate-400">Chargement de la collection...</p>
            </div>
        </div>
    </main>

    <footer class="border-t border-slate-200 py-10 text-center text-slate-400 text-sm">
        <p>&copy; 2026 DropExpress. Hébergé sur Vercel & Firestore.</p>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Tes clés configurées
        const firebaseConfig = {
            apiKey: "AIzaSyAs_xRDDAUjh_AemBZFBDCKQ9QXTNWuJ00",
            authDomain: "dropexpress-ba171.firebaseapp.com",
            projectId: "dropexpress-ba171",
            storageBucket: "dropexpress-ba171.firebasestorage.app",
            messagingSenderId: "1070163070918",
            appId: "1:1070163070918:web:2c3e26ad6ea0688cb4acc7",
            measurementId: "G-YSRK4VCL5K"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const grid = document.getElementById('product-grid');

        async function getProducts() {
            try {
                const snapshot = await getDocs(collection(db, "products"));
                grid.innerHTML = "";

                if (snapshot.empty) {
                    grid.innerHTML = `<div class="col-span-full text-center p-12 bg-white rounded-3xl border-2 border-dashed border-slate-200">
                        <p class="text-slate-500 font-medium">La boutique est vide pour le moment.</p>
                        <p class="text-sm text-slate-400">Ajoutez des produits dans Firestore pour les voir ici.</p>
                    </div>`;
                    return;
                }

                snapshot.forEach(doc => {
                    const item = doc.data();
                    grid.innerHTML += `
                        <div class="product-card bg-white rounded-[32px] p-4 shadow-sm hover:shadow-xl transition-all duration-300 group">
                            <div class="aspect-square bg-slate-100 rounded-[24px] overflow-hidden mb-5">
                                <img src="${item.image || 'https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=500'}" 
                                     class="w-full h-full object-cover transition-transform duration-500">
                            </div>
                            <div class="px-2">
                                <h3 class="font-bold text-lg mb-1">${item.name}</h3>
                                <p class="text-blue-600 font-extrabold text-xl">${item.price} €</p>
                                <button class="mt-4 w-full bg-slate-900 text-white py-3 rounded-2xl font-bold active:scale-95 transition-transform group-hover:bg-blue-600">
                                    Ajouter au panier
                                </button>
                            </div>
                        </div>
                    `;
                });
            } catch (e) {
                grid.innerHTML = `<p class="col-span-full text-center text-red-500">Erreur de connexion : ${e.message}</p>`;
            }
        }

        getProducts();
    </script>
</body>
</html>
