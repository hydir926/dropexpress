<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DropExpress | Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050505; color: #fff; }
        .order-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 1.5rem; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-black italic uppercase">Drop<span class="text-blue-500">Express</span> Admin</h1>
                <p class="text-gray-500 text-sm">Gestion des commandes et livraisons</p>
            </div>
            <button onclick="location.reload()" class="bg-white/5 hover:bg-white/10 p-3 rounded-full transition text-sm">
                🔄 Actualiser
            </button>
        </header>

        <div id="orders-list" class="grid gap-6">
            <p class="text-center text-gray-500">Chargement des commandes...</p>
        </div>
    </div>

    <script type="module">
        import { db, collection, getDocs, query, orderBy } from "./firebase.js";

        async function loadOrders() {
            const container = document.getElementById('orders-list');
            try {
                // Requête pour récupérer les commandes
                const q = query(collection(db, "orders"), orderBy("date", "desc"));
                const querySnapshot = await getDocs(q);
                
                if (querySnapshot.empty) {
                    container.innerHTML = "<p class='text-center text-gray-500'>Aucune commande trouvée dans la base.</p>";
                    return;
                }

                container.innerHTML = "";
                querySnapshot.forEach((doc) => {
                    const order = doc.data();
                    // On sécurise l'affichage de la date
                    const dateStr = order.date ? new Date(order.date).toLocaleString('fr-FR') : "Date inconnue";
                    
                    // Correction de la syntaxe template ici
                    const itemsHtml = order.articles ? order.articles.map(item => `<li>• ${item.name} (${item.price}€)</li>`).join('') : "Aucun article";

                    container.innerHTML += `
                        <div class="order-card p-6 flex flex-col md:flex-row gap-6 items-start">
                            <div class="flex-1">
                                <div class="flex items-center gap-3 mb-2">
                                    <span class="bg-blue-500/10 text-blue-500 text-[10px] font-bold px-2 py-1 rounded">PAYÉ</span>
                                    <span class="text-gray-500 text-xs">${dateStr}</span>
                                </div>
                                <h3 class="text-xl font-bold mb-1">${order.client || order.nom || 'Client sans nom'}</h3>
                                <p class="text-gray-400 text-sm mb-4 italic italic">📍 ${order.adresse || 'Adresse non renseignée'}</p>
                                <div class="flex gap-2 text-xs text-blue-400">
                                    <span>📧 ${order.email || 'Email absent'}</span>
                                </div>
                            </div>
                            
                            <div class="w-full md:w-64 bg-black/40 p-4 rounded-2xl border border-white/5">
                                <p class="text-[10px] font-bold text-gray-500 uppercase mb-3 tracking-widest">Détails</p>
                                <ul class="text-xs space-y-2 mb-4 text-gray-300">
                                    ${itemsHtml}
                                </ul>
                                <div class="border-t border-white/10 pt-3 flex justify-between font-bold text-blue-500">
                                    <span>Total</span>
                                    <span>${order.total || '0.00 €'}</span>
                                </div>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                console.error("Erreur Firebase:", error);
                container.innerHTML = `
                    <div class="text-center p-8 bg-red-500/10 border border-red-500/20 rounded-2xl">
                        <p class="text-red-500 font-bold">Erreur de chargement</p>
                        <p class="text-gray-500 text-xs mt-2">${error.message}</p>
                    </div>`;
            }
        }

        loadOrders();
    </script>
</body>
</html>
