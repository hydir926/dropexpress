<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DropExpress | Boutique</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #000000; color: #ffffff; }
        .cart-open { transform: translateX(0) !important; }
        .product-card { background: #0a0a0a; border: 1px solid #1a1a1a; }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-40 bg-black/80 backdrop-blur-md border-b border-white/10">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <span class="text-2xl font-black tracking-tighter italic italic">DROP<span class="text-blue-500">EXPRESS</span></span>
            <button onclick="toggleCart()" class="relative p-2">
                <span class="text-2xl">🛒</span>
                <span id="cart-count" class="absolute -top-1 -right-1 bg-blue-600 text-[10px] font-bold px-1.5 py-0.5 rounded-full text-white">0</span>
            </button>
        </div>
    </nav>

    <div id="cart-sidebar" class="fixed top-0 right-0 h-full w-full sm:w-80 bg-black border-l border-white/10 shadow-2xl z-50 transition-transform transform translate-x-full flex flex-col">
        <div class="p-6 border-b border-white/10 flex justify-between items-center">
            <h2 class="font-bold text-xl text-white">Mon Panier</h2>
            <button onclick="toggleCart()" class="text-3xl text-white">&times;</button>
        </div>
        <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-4 text-white">
            </div>
        <div class="p-6 border-t border-white/10 bg-[#0a0a0a]">
            <div class="flex justify-between mb-6 font-bold text-xl text-white">
                <span>Total</span>
                <span id="cart-total">0.00 €</span>
            </div>
            <button onclick="checkoutWhatsApp()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold active:scale-95 transition-transform">
                Commander sur WhatsApp
            </button>
        </div>
    </div>

    <header class="py-16 px-6 text-center max-w-4xl mx-auto">
        <h1 class="text-5xl md:text-7xl font-extrabold mb-6 tracking-tight leading-tight">
            Le futur du shopping <br>
            <span class="text-blue-500 font-black">commence ici.</span>
        </h1>
        <p class="text-gray-400 text-lg md:text-xl max-w-2xl mx-auto">
            Découvrez notre sélection exclusive de produits premium expédiés en un temps record.
        </p>
    </header>

    <main class="max-w-7xl mx-auto px-6 pb-24">
        <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 text-white">
            </div>
    </main>

    <footer class="py-12 text-center text-gray-600 text-sm border-t border-white/5">
        <p>&copy; 2026 DropExpress. Hébergé sur Vercel & Firestore.</p>
    </footer>

    <script type="module">
        import { db, collection, getDocs } from "./firebase.js";

        let cart = JSON.parse(localStorage.getItem('dropexpress_cart')) || [];
        const grid = document.getElementById('product-grid');
        const cartSidebar = document.getElementById('cart-sidebar');

        window.toggleCart = () => cartSidebar.classList.toggle('cart-open');

        window.addToCart = (name, price) => {
            cart.push({ name, price });
            saveCart();
            renderCart();
            toggleCart();
        };

        window.removeFromCart = (index) => {
            cart.splice(index, 1);
            saveCart();
            renderCart();
        };

        function saveCart() {
            localStorage.setItem('dropexpress_cart', JSON.stringify(cart));
            document.getElementById('cart-count').innerText = cart.length;
        }

        function renderCart() {
            const container = document.getElementById('cart-items');
            const totalEl = document.getElementById('cart-total');
            container.innerHTML = "";
            let total = 0;

            cart.forEach((item, index) => {
                total += item.price;
                container.innerHTML += `
                    <div class="flex justify-between items-center bg-white/5 p-4 rounded-2xl border border-white/5 text-white">
                        <div>
                            <p class="font-bold text-sm">${item.name}</p>
                            <p class="text-blue-500 font-bold">${item.price} €</p>
                        </div>
                        <button onclick="removeFromCart(${index})" class="text-red-500 text-xs font-bold uppercase tracking-widest">Suppr.</button>
                    </div>
                `;
            });
            totalEl.innerText = total.toFixed(2) + " €";
        }

        window.checkoutWhatsApp = () => {
            if(cart.length === 0) return alert("Le panier est vide !");
            const phone = "33612345678"; // ⚠️ METS TON NUMÉRO ICI
            let message = "Salut DropExpress ! Je veux commander :\n\n";
            cart.forEach(item => message += `- ${item.name} (${item.price}€)\n`);
            message += `\nTotal : ${document.getElementById('cart-total').innerText}`;
            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(message)}`, '_blank');
        };

        async function loadProducts() {
            const querySnapshot = await getDocs(collection(db, "products"));
            grid.innerHTML = "";
            querySnapshot.forEach((doc) => {
                const p = doc.data();
                grid.innerHTML += `
                    <div class="product-card rounded-[2.5rem] p-5 shadow-2xl group transition-all">
                        <div class="aspect-square rounded-[2rem] overflow-hidden bg-[#111] mb-6 border border-white/5">
                            <img src="${p.image}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700">
                        </div>
                        <h3 class="font-bold text-xl px-2 mb-2 text-white">${p.name}</h3>
                        <div class="flex justify-between items-center mt-4 px-2">
                            <span class="text-blue-500 font-black text-2xl">${p.price}€</span>
                            <button onclick="addToCart('${p.name}', ${p.price})" class="bg-white text-black px-6 py-3 rounded-2xl font-bold active:scale-90 transition">
                                + Ajouter
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        renderCart();
        saveCart();
        loadProducts();
    </script>
</body>
</html>
