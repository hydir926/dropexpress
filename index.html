<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DropExpress | Boutique Officielle</title>
    <meta name="description" content="Gadgets High-Tech, Déco et Accessoires tendances. Livraison offerte.">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://www.paypal.com/sdk/js?client-id=sb&currency=EUR"></script>
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #000; color: #fff; margin: 0; overflow-x: hidden; }
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
        @media (min-width: 768px) { .product-grid { grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 40px; } }
        .product-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 1.5rem; padding: 12px; display: flex; flex-direction: column; height: 100%; position: relative; transition: 0.3s; }
        .product-card:hover { border-color: #2563eb; transform: translateY(-5px); }
        .product-img { width: 100%; height: 160px; object-fit: cover; border-radius: 1rem; margin-bottom: 10px; background: #111; }
        .cart-sidebar { position: fixed; right: 0; top: 0; height: 100%; width: 100%; max-width: 400px; background: #0a0a0a; transform: translateX(100%); transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; border-left: 1px solid #1a1a1a; display: flex; flex-direction: column; }
        .cart-open { transform: translateX(0); }
        .category-btn { background: #111; border: 1px solid #222; color: #666; padding: 8px 16px; border-radius: 50px; font-size: 10px; font-weight: 800; text-transform: uppercase; transition: 0.3s; white-space: nowrap; }
        .category-btn.active { background: #2563eb; border-color: #2563eb; color: white; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-50 bg-black/80 backdrop-blur-xl border-b border-white/5 py-4 px-5 flex justify-between items-center">
        <span class="text-lg font-black italic uppercase italic">DROP<span class="text-blue-500">EXPRESS</span></span>
        <div class="flex items-center gap-2">
            <a href="connexion.html" class="text-[9px] font-black uppercase border border-white/20 px-3 py-2 rounded-full">Connexion</a>
            <button onclick="toggleCart()" class="bg-blue-600 text-white px-3 py-2 rounded-full font-bold text-[10px] flex items-center gap-1">
                <span id="cart-count">0</span> 🛒
            </button>
        </div>
    </nav>

    <header class="pt-10 pb-6 text-center px-4">
        <h1 class="text-4xl font-black mb-6 uppercase italic text-blue-500 italic">BOUTIQUE</h1>
        <div class="max-w-md mx-auto mb-6 px-4 text-white">
            <input type="text" id="search-input" oninput="filterProducts()" placeholder="Rechercher..." class="w-full bg-[#111] border border-white/10 rounded-xl px-5 py-3 text-sm outline-none focus:border-blue-500 transition">
        </div>
        <div class="flex gap-2 overflow-x-auto pb-4 px-4 no-scrollbar justify-start md:justify-center">
            <button class="category-btn active" onclick="setCategory('all', this)">Tous</button>
            <button class="category-btn" onclick="setCategory('High-Tech', this)">High-Tech</button>
            <button class="category-btn" onclick="setCategory('Déco', this)">Déco</button>
            <button class="category-btn" onclick="setCategory('Accessoires', this)">Accessoires</button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto min-h-[400px]">
        <div class="product-grid" id="product-grid"></div>
    </main>

    <footer class="bg-[#050505] border-t border-white/5 py-12 px-6 text-center mt-20">
        <div class="mb-6 text-xl font-black italic uppercase">DROP<span class="text-blue-500">EXPRESS</span></div>
        <div class="flex flex-wrap justify-center gap-6 mb-8 text-[9px] font-black uppercase text-gray-500">
            <a href="#">TikTok</a> <a href="#">Instagram</a> <a href="#">CGV</a> <a href="#">Mentions</a>
        </div>
        <p class="text-[8px] text-gray-700 uppercase font-bold tracking-[2px]">© 2026 DropExpress</p>
    </footer>

    <div id="cart-sidebar" class="cart-sidebar shadow-2xl">
        <div class="p-6 border-b border-white/5 flex justify-between items-center bg-[#0d0d0d]">
            <h2 class="text-lg font-black uppercase italic">Panier</h2>
            <button onclick="toggleCart()" class="text-3xl">&times;</button>
        </div>
        <div id="cart-items" class="p-4 flex-1 overflow-y-auto no-scrollbar"></div>
        <div class="p-6 border-t border-white/5 bg-[#050505]">
            <div class="flex justify-between items-center mb-6">
                <span class="text-[10px] font-black uppercase text-gray-400">Total :</span>
                <span id="cart-total" class="text-xl font-black text-blue-500">0.00€</span>
            </div>
            <div id="paypal-button-container"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { initializeFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyAs_xRDDAUjh_AemBZFBDCKQ9QXTNWuJ00", 
            authDomain: "dropexpress-ba171.firebaseapp.com", 
            projectId: "dropexpress-ba171", 
            storageBucket: "dropexpress-ba171.firebasestorage.app", 
            appId: "1:1070163070918:web:2c3e26ad6ea0688cb4acc7" 
        };
        
        const app = initializeApp(firebaseConfig);
        const db = initializeFirestore(app, { experimentalForceLongPolling: true });

        let allProducts = [];
        let cart = [];
        let currentCategory = 'all';

        // SYNC FIREBASE
        onSnapshot(collection(db, "products"), snap => {
            allProducts = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderProducts();
        });

        // RENDU PRODUITS (Correction détection Images)
        function renderProducts() {
            const grid = document.getElementById('product-grid');
            const search = document.getElementById('search-input').value.toLowerCase();
            grid.innerHTML = "";

            allProducts.filter(p => (currentCategory === 'all' || p.category === currentCategory) && p.name.toLowerCase().includes(search))
            .forEach(p => {
                // Détection de l'image sur plusieurs champs possibles
                const imgUrl = p.mainImage || p.image || p.imageUrl || p.photo || 'https://via.placeholder.com/300x300?text=Image+Indisponible';
                const desc = p.description || "";

                grid.innerHTML += `
                    <div class="product-card">
                        <img src="${imgUrl}" class="product-img" onerror="this.src='https://via.placeholder.com/300x300?text=Erreur+Lien'">
                        <h3 class="text-[10px] font-extrabold uppercase text-white mb-1 truncate">${p.name}</h3>
                        <p class="text-gray-500 text-[8.5px] leading-tight mb-2 line-clamp-2">${desc}</p>
                        <div class="mt-auto">
                            <span class="text-sm font-black text-blue-500 block mb-2">${p.price}€</span>
                            <button onclick="addToCart('${p.id}', '${p.name.replace(/'/g, "\\'")}', ${p.price})" class="w-full bg-white text-black py-2 rounded-lg font-black text-[9px] uppercase hover:bg-blue-600 hover:text-white transition">Acheter</button>
                        </div>
                    </div>`;
            });
        }

        // LOGIQUE PANIER
        window.addToCart = (id, name, price) => {
            const existing = cart.find(item => item.id === id);
            if (existing) { existing.quantity += 1; } 
            else { cart.push({ id, name, price, quantity: 1 }); }
            updateCart();
            if (!document.getElementById('cart-sidebar').classList.contains('cart-open')) toggleCart();
        };

        window.changeQty = (id, delta) => {
            const item = cart.find(i => i.id === id);
            if (item) {
                item.quantity += delta;
                if (item.quantity <= 0) cart = cart.filter(i => i.id !== id);
                updateCart();
            }
        };

        function updateCart() {
            const container = document.getElementById('cart-items');
            const totalDisplay = document.getElementById('cart-total');
            document.getElementById('cart-count').innerText = cart.reduce((acc, i) => acc + i.quantity, 0);
            container.innerHTML = cart.length === 0 ? '<p class="text-center mt-20 opacity-20 text-[10px] font-black uppercase">Panier Vide</p>' : "";

            let total = 0;
            cart.forEach(item => {
                total += (item.price * item.quantity);
                container.innerHTML += `
                    <div class="flex justify-between items-center p-4 bg-white/5 rounded-2xl mb-3 border border-white/5">
                        <div class="flex flex-col">
                            <span class="text-[9px] font-black uppercase">${item.name}</span>
                            <span class="text-[10px] font-bold text-blue-500">${item.price}€</span>
                        </div>
                        <div class="flex items-center gap-3 bg-black/40 px-3 py-1 rounded-full border border-white/10">
                            <button onclick="changeQty('${item.id}', -1)" class="text-blue-500 font-bold">-</button>
                            <span class="text-[10px] font-black">${item.quantity}</span>
                            <button onclick="changeQty('${item.id}', 1)" class="text-blue-500 font-bold">+</button>
                        </div>
                    </div>`;
            });
            totalDisplay.innerText = total.toFixed(2) + "€";
            renderPayPal(total);
        }

        function renderPayPal(amount) {
            const container = document.getElementById('paypal-button-container');
            container.innerHTML = ""; if (amount <= 0) return;
            paypal.Buttons({
                createOrder: (data, actions) => actions.order.create({ purchase_units: [{ amount: { value: amount.toFixed(2) } }] }),
                onApprove: (data, actions) => actions.order.capture().then(() => { alert("Succès !"); cart = []; updateCart(); toggleCart(); })
            }).render('#paypal-button-container');
        }

        window.toggleCart = () => document.getElementById('cart-sidebar').classList.toggle('cart-open');
        window.setCategory = (cat, btn) => {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active'); currentCategory = cat; renderProducts();
        };
        window.filterProducts = () => renderProducts();
    </script>
</body>
</html>
