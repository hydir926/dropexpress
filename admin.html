<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DropExpress | Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050505; color: #fff; }
        .order-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 1.5rem; transition: 0.3s; }
        .order-card:hover { border-color: #2563eb; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-black italic tracking-tighter uppercase">Drop<span class="text-blue-500">Express</span> Admin</h1>
                <p class="text-gray-500 text-sm">Gestion des ventes sécurisée</p>
            </div>
            <button onclick="location.reload()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-full font-bold transition flex items-center gap-2">
                <span>🔄</span> Actualiser
            </button>
        </header>

        <div id="orders-list" class="grid gap-6">
            <p class="text-center text-gray-500 animate-pulse">Vérification de l'accès...</p>
        </div>
    </div>

    <script type="module">
        // --- 1. SÉCURITÉ PAR MOT DE PASSE ---
        const SECRET_KEY = "AMIR2026"; // <--- Tu peux changer ce mot de passe
        
        const checkAuth = () => {
            const pass = prompt("Accès Administrateur - Entrez votre code :");
            if (pass !== SECRET_KEY) {
                alert("Accès refusé !");
                window.location.href = "index.html";
                return false;
            }
            return true;
        };

        // --- 2. IMPORT ET LOGIQUE FIREBASE ---
        import { db, collection, getDocs, query, orderBy } from "./firebase.js";

        async function loadOrders() {
            const container = document.getElementById('orders-list');
            
            try {
                const q = query(collection(db, "orders"), orderBy("date", "desc"));
                const querySnapshot = await getDocs(q);
                
                if (querySnapshot.empty) {
                    container.innerHTML = "<div class='py-20 text-center border border-dashed border-white/10 rounded-3xl text-gray-500'>Aucune commande trouvée.</div>";
                    return;
                }

                container.innerHTML = "";
                querySnapshot.forEach((doc) => {
                    const order = doc.data();
                    const dateAction = order.date ? new Date(order.date).toLocaleString('fr-FR') : "Date inconnue";
                    
                    // Gestion sécurisée de la liste d'articles
                    let itemsHtml = "";
                    if (order.articles && Array.isArray(order.articles)) {
                        itemsHtml = order.articles.map(item => `
                            <li class="flex justify-between text-gray-400 py-1 border-b border-white/5 last:border-0">
                                <span>${item.name}</span>
                                <span class="font-bold text-white">${item.price}€</span>
                            </li>
                        `).join('');
                    }

                    container.innerHTML += `
                        <div class="order-card p-6 md:p-8">
                            <div class="flex flex-col md:flex-row justify-between gap-6">
                                <div class="flex-1">
                                    <div class="flex items-center gap-3 mb-4">
                                        <span class="bg-blue-500/20 text-blue-400 text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-tighter">Paiement Reçu</span>
                                        <span class="text-gray-600 text-xs">${dateAction}</span>
                                    </div>
                                    <h2 class="text-2xl font-bold mb-2">${order.client || "Client Anonyme"}</h2>
                                    <div class="space-y-1 mb-4">
                                        <p class="text-blue-500 font-medium italic">📍 ${order.adresse || "Pas d'adresse"}</p>
                                        <p class="text-gray-500 text-sm">📧 ${order.email || "Email non fourni"}</p>
                                    </div>
                                </div>

                                <div class="w-full md:w-80 bg-white/5 p-6 rounded-2xl border border-white/5">
                                    <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-4">Contenu du colis</p>
                                    <ul class="text-sm space-y-2 mb-4">
                                        ${itemsHtml}
                                    </ul>
                                    <div class="pt-4 border-t border-white/10 flex justify-between items-center">
                                        <span class="font-bold text-gray-400">TOTAL</span>
                                        <span class="text-2xl font-black text-blue-500">${order.total}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                console.error("Erreur:", error);
                container.innerHTML = `<div class="p-6 bg-red-500/10 border border-red-500/20 rounded-2xl text-red-500 text-center">
                    <p class="font-bold">Erreur de connexion Firebase</p>
                    <p class="text-xs mt-2 italic">${error.message}</p>
                </div>`;
            }
        }

        // Lancement de la page
        if (checkAuth()) {
            loadOrders();
        }
    </script>
</body>
</html>
