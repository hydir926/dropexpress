<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DropExpress | Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050505; color: #fff; }
        .card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 1.5rem; transition: 0.3s; }
        .card:hover { border-color: #2563eb; }
        .tab-btn { padding: 10px 25px; border-radius: 99px; font-weight: 800; font-size: 14px; transition: 0.3s; color: #666; }
        .tab-btn.active { background: #2563eb; color: #fff; shadow: 0 4px 15px rgba(37, 99, 235, 0.3); }
        input { background: #111 !important; border: 1px solid #222 !important; color: white !important; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <div>
                <h1 class="text-3xl font-black italic uppercase tracking-tighter">Drop<span class="text-blue-500">Express</span> Admin</h1>
                <p class="text-gray-500 text-xs font-bold uppercase tracking-widest mt-1">Gestionnaire de boutique</p>
            </div>
            
            <div class="flex bg-white/5 p-1 rounded-full border border-white/10">
                <button onclick="switchTab('orders')" id="btn-orders" class="tab-btn active">Commandes</button>
                <button onclick="switchTab('products')" id="btn-products" class="tab-btn">Stock / Produits</button>
            </div>
        </header>

        <div id="section-orders" class="space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="text-xl font-bold italic">Dernières ventes</h2>
                <button onclick="location.reload()" class="text-xs bg-white/5 hover:bg-white/10 px-4 py-2 rounded-lg border border-white/10 transition">🔄 Actualiser</button>
            </div>
            <div id="orders-list" class="grid gap-6">
                <p class="text-center text-gray-600 animate-pulse py-20">Chargement des commandes...</p>
            </div>
        </div>

        <div id="section-products" class="hidden space-y-8">
            <div class="card p-6 border-blue-500/30 bg-blue-500/5">
                <h2 class="text-xl font-bold mb-4">Ajouter une nouvelle paire</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <input type="text" id="p-name" placeholder="Nom du modèle" class="p-3 rounded-xl outline-none">
                    <input type="number" id="p-price" placeholder="Prix (€)" class="p-3 rounded-xl outline-none">
                    <input type="text" id="p-img" placeholder="Lien de l'image (URL)" class="p-3 rounded-xl outline-none">
                    <button onclick="addProduct()" class="md:col-span-3 bg-blue-600 hover:bg-blue-700 py-4 rounded-xl font-bold transition shadow-lg shadow-blue-600/20">
                        Mettre en ligne
                    </button>
                </div>
            </div>
            
            <div class="flex justify-between items-center">
                <h2 class="text-xl font-bold italic">Produits en boutique</h2>
            </div>
            <div id="products-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>
    </div>

    <script type="module">
        import { db, collection, getDocs, addDoc, query, orderBy, deleteDoc, doc } from "./firebase.js";

        // --- SÉCURITÉ ACCÈS ---
        const pass = prompt("Accès Administrateur - Entrez votre code :");
        if (pass !== "AMIR2026") { 
            alert("Accès refusé");
            window.location.href = "index.html";
        }

        // --- NAVIGATION ---
        window.switchTab = (tab) => {
            document.getElementById('section-orders').classList.toggle('hidden', tab !== 'orders');
            document.getElementById('section-products').classList.toggle('hidden', tab !== 'products');
            document.getElementById('btn-orders').classList.toggle('active', tab === 'orders');
            document.getElementById('btn-products').classList.toggle('active', tab === 'products');
            if(tab === 'products') loadProducts(); else loadOrders();
        }

        // --- CHARGEMENT DES COMMANDES ---
        async function loadOrders() {
            const container = document.getElementById('orders-list');
            try {
                const q = query(collection(db, "orders"), orderBy("date", "desc"));
                const snap = await getDocs(q);
                container.innerHTML = "";

                if (snap.empty) {
                    container.innerHTML = "<p class='text-center py-20 text-gray-600 border border-dashed border-white/10 rounded-3xl'>Aucune commande pour le moment.</p>";
                    return;
                }

                snap.forEach(d => {
                    const o = d.data();
                    const date = o.date ? new Date(o.date).toLocaleDateString('fr-FR', {day: '2-digit', month: '2-digit', year: 'numeric'}) : "Date inconnue";
                    
                    container.innerHTML += `
                    <div class="card p-6 md:p-8">
                        <div class="flex flex-col md:flex-row justify-between gap-6">
                            <div class="flex-1">
                                <div class="flex items-center gap-3 mb-4">
                                    <span class="bg-blue-500/20 text-blue-400 text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-widest italic">Payé</span>
                                    <span class="text-gray-600 text-xs font-bold uppercase tracking-tighter">${date}</span>
                                </div>
                                <h2 class="text-2xl font-black mb-3">${o.client || "Client Inconnu"}</h2>
                                <div class="space-y-2">
                                    <p class="text-blue-500 font-bold text-sm italic flex items-center gap-2">📍 ${o.adresse || "Pas d'adresse"}</p>
                                    <p class="text-blue-400 font-bold text-sm flex items-center gap-2">📞 ${o.telephone || "Pas de numéro"}</p>
                                    <p class="text-gray-500 text-xs font-bold lowercase">📧 ${o.email || "Pas d'email"}</p>
                                </div>
                            </div>

                            <div class="w-full md:w-72 bg-white/5 p-5 rounded-2xl border border-white/5">
                                <p class="text-[10px] font-black text-gray-600 uppercase tracking-widest mb-4">Articles commandés</p>
                                <ul class="text-xs space-y-2 mb-4">
                                    ${o.articles ? o.articles.map(a => `<li class="flex justify-between border-b border-white/5 pb-1"><span>${a.name}</span><span class="font-bold">${a.price}€</span></li>`).join('') : "Détails indisponibles"}
                                </ul>
                                <div class="pt-4 border-t border-white/10 flex justify-between items-center">
                                    <span class="font-black text-gray-500 text-xs uppercase">Total</span>
                                    <span class="text-2xl font-black text-blue-500">${o.total || "0.00"}</span>
                                </div>
                            </div>
                        </div>
                    </div>`;
                });
            } catch (err) { console.error(err); }
        }

        // --- GESTION DES PRODUITS ---
        async function loadProducts() {
            const container = document.getElementById('products-list');
            const snap = await getDocs(collection(db, "products"));
            container.innerHTML = "";
            snap.forEach(d => {
                const p = d.data();
                container.innerHTML += `
                <div class="card p-4 flex justify-between items-center">
                    <div class="flex items-center gap-4">
                        <img src="${p.image}" class="w-14 h-14 rounded-xl object-cover border border-white/10">
                        <div>
                            <p class="font-black text-sm uppercase italic">${p.name}</p>
                            <p class="text-blue-500 font-bold text-lg">${p.price}€</p>
                        </div>
                    </div>
                    <button onclick="deleteProduct('${d.id}')" class="bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white px-4 py-2 rounded-xl text-xs font-black transition">
                        Supprimer
                    </button>
                </div>`;
            });
        }

        window.addProduct = async () => {
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            const image = document.getElementById('p-img').value;
            if(!name || !price || !image) return alert("Veuillez remplir tous les champs.");
            
            await addDoc(collection(db, "products"), { 
                name, 
                price: parseFloat(price), 
                image,
                dateAjout: new Date().toISOString()
            });
            
            alert("Produit ajouté avec succès !");
            document.getElementById('p-name').value = "";
            document.getElementById('p-price').value = "";
            document.getElementById('p-img').value = "";
            loadProducts();
        };

        window.deleteProduct = async (id) => {
            if(confirm("Supprimer définitivement ce produit ?")) {
                await deleteDoc(doc(db, "products", id));
                loadProducts();
            }
        };

        // Lancement initial
        loadOrders();
    </script>
</body>
</html>
