<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DropExpress | Dashboard Commandes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050505; color: #fff; }
        .order-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 1.5rem; transition: 0.3s; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-black italic">DROP<span class="text-blue-500">EXPRESS</span> ADMIN</h1>
                <p class="text-gray-500 text-sm">Gestion des commandes et livraisons</p>
            </div>
            <button onclick="location.reload()" class="bg-white/5 hover:bg-white/10 p-3 rounded-full transition">
                🔄 Actualiser
            </button>
        </header>

        <div id="orders-list" class="grid gap-6">
            <p class="text-center text-gray-500 animate-pulse">Chargement des commandes...</p>
        </div>
    </div>

    <script type="module">
        import { db, collection, getDocs, query, orderBy } from "./firebase.js";

        async function loadOrders() {
            const container = document.getElementById('orders-list');
            try {
                // On récupère les commandes de la plus récente à la plus ancienne
                const q = query(collection(db, "orders"), orderBy("date", "desc"));
                const querySnapshot = await getDocs(q);
                
                if (querySnapshot.empty) {
                    container.innerHTML = "<p class='text-center text-gray-500'>Aucune commande pour le moment.</p>";
                    return;
                }

                container.innerHTML = "";
                querySnapshot.forEach((doc) => {
                    const order = doc.data();
                    const date = new Date(order.date).toLocaleString('fr-FR');
                    
                    container.innerHTML += `
                        <div class="order-card p-6 flex flex-col md:flex-row gap-6 items-start">
                            <div class="flex-1">
                                <div class="flex items-center gap-3 mb-2">
                                    <span class="bg-blue-500/10 text-blue-500 text-[10px] font-bold px-2 py-1 rounded">PAYÉ</span>
                                    <span class="text-gray-500 text-xs">${date}</span>
                                </div>
                                <h3 class="text-xl font-bold mb-1">${order.client || 'Client anonyme'}</h3>
                                <p class="text-gray-400 text-sm mb-4">📍 ${order.adresse || 'Pas d'adresse'}</p>
                                <div class="flex gap-2">
                                    <span class="text-xs bg-white/5 px-3 py-1 rounded-lg border border-white/5">📧 ${order.email}</span>
                                </div>
                            </div>
                            
                            <div class="w-full md:w-64 bg-black/40 p-4 rounded-2xl border border-white/5">
                                <p class="text-[10px] font-bold text-gray-500 uppercase mb-3">Produits commandés</p>
                                <ul class="text-sm space-y-1 mb-3">
                                    ${order.articles.map(item => `<li>• ${item.name} (${item.price}€)</li>`).join('')}
                                </ul>
                                <div class="border-t border-white/5 pt-2 flex justify-between font-bold text-blue-500">
                                    <span>Total</span>
                                    <span>${order.total}</span>
                                </div>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                console.error("Erreur:", error);
                container.innerHTML = "<p class='text-red-500 text-center'>Erreur lors du chargement. Vérifie tes règles Firestore.</p>";
            }
        }

        loadOrders();
    </script>
</body>
</html>
