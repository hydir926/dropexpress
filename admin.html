<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DropExpress | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050505; color: #fff; }
        .order-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 1.5rem; }
    </style>
</head>
<body class="p-6">

    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-12">
            <div>
                <h1 class="text-3xl font-black italic">DROP<span class="text-blue-500">EXPRESS</span> ADMIN</h1>
                <p class="text-gray-500 text-sm">Gestion des commandes</p>
            </div>
            <button onclick="location.reload()" class="bg-blue-600 px-5 py-2 rounded-full font-bold text-sm">Actualiser</button>
        </header>

        <div id="orders-list" class="space-y-6">
            <p class="text-center text-gray-500">Chargement...</p>
        </div>
    </div>

    <script type="module">
        // Importation corrigée
        import { db, collection, getDocs, query, orderBy } from "./firebase.js";

        async function loadOrders() {
            const container = document.getElementById('orders-list');
            try {
                // Cette ligne nécessite que query et orderBy soient dans firebase.js
                const q = query(collection(db, "orders"), orderBy("date", "desc"));
                const querySnapshot = await getDocs(q);
                
                if (querySnapshot.empty) {
                    container.innerHTML = "<p class='text-center text-gray-500'>Aucune commande.</p>";
                    return;
                }

                container.innerHTML = "";
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const items = data.articles || [];
                    
                    container.innerHTML += `
                        <div class="order-card p-6 border border-white/5 mb-4">
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <h2 class="text-xl font-bold">${data.client || data.nom || 'Client'}</h2>
                                    <p class="text-blue-400 text-sm italic">📍 ${data.adresse || 'Pas d'adresse'}</p>
                                </div>
                                <span class="text-xs text-gray-500">${data.date ? new Date(data.date).toLocaleString() : ''}</span>
                            </div>
                            <div class="bg-white/5 p-4 rounded-xl">
                                <ul class="text-sm mb-2">
                                    ${items.map(i => `<li>- ${i.name} (${i.price}€)</li>`).join('')}
                                </ul>
                                <p class="text-right font-black text-blue-500">Total: ${data.total}</p>
                            </div>
                        </div>`;
                });
            } catch (error) {
                console.error(error);
                container.innerHTML = "<p class='text-red-500 text-center'>Erreur : " + error.message + "</p>";
            }
        }
        loadOrders();
    </script>
</body>
</html>
