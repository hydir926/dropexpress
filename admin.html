<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DropExpress | Official Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://www.paypal.com/sdk/js?client-id=sb&currency=EUR"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #000; color: #fff; margin: 0; overflow-x: hidden; }
        .fade-in { animation: fadeIn 1s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .cart-sidebar { position: fixed; right: 0; top: 0; height: 100%; width: 100%; max-width: 450px; background: #0a0a0a; transform: translateX(100%); transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; border-left: 1px solid #1a1a1a; display: flex; flex-direction: column; overflow-y: auto; }
        .cart-open { transform: translateX(0); }
        .product-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 2.5rem; padding: 1.2rem; transition: 0.3s; height: 100%; display: flex; flex-direction: column; }
        input { background: #111 !important; border: 1px solid #222 !important; color: white !important; width: 100%; padding: 14px; border-radius: 12px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <nav class="sticky top-0 z-50 bg-black/60 backdrop-blur-xl border-b border-white/5 p-5 flex justify-between items-center px-6">
        <span class="text-2xl font-black italic uppercase">DROP<span class="text-blue-500">EXPRESS</span></span>
        <button onclick="toggleCart()" class="bg-blue-600 text-white px-6 py-2 rounded-full font-bold">🛒 (<span id="cart-count">0</span>)</button>
    </nav>

    <section class="h-[70vh] flex items-center justify-center text-center px-6 bg-gradient-to-b from-blue-900/10 to-black">
        <div class="fade-in">
            <h1 class="text-5xl md:text-7xl font-black mb-4">Le futur du shopping<br><span class="text-blue-500 italic">commence ici.</span></h1>
            <p class="text-gray-400 text-lg mb-8">Articles exclusifs. Livraison mondiale. <br><b>Paiement 100% sécurisé.</b></p>
            <a href="#shop" class="bg-white text-black px-8 py-4 rounded-full font-black uppercase text-xs">Découvrir</a>
        </div>
    </section>

    <section id="shop" class="max-w-7xl mx-auto px-6 py-20">
        <h2 class="text-3xl font-black italic mb-10 uppercase">Nouveautés</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10" id="product-grid"></div>
    </section>

    <div id="cart-sidebar" class="cart-sidebar">
        <div class="p-8 flex justify-between items-center border-b border-white/5">
            <h2 class="text-2xl font-black italic">PANIER</h2>
            <button onclick="toggleCart()" class="text-3xl">&times;</button>
        </div>
        <div id="cart-items" class="p-6 flex-1"></div>
        <div class="p-8 bg-[#050505] border-t border-white/5">
            <input type="text" id="cust-name" placeholder="Nom complet">
            <input type="tel" id="cust-phone" placeholder="Téléphone">
            <input type="text" id="cust-address" placeholder="Adresse complète">
            <div class="flex justify-between text-2xl font-black my-4"><span>TOTAL</span><span id="cart-total" class="text-blue-500">0€</span></div>
            <div id="paypal-button-container"></div>
        </div>
    </div>

    <script type="module">
        import { db, collection, onSnapshot, addDoc } from "./firebase.js";
        let cart = [];

        window.toggleCart = () => document.getElementById('cart-sidebar').classList.toggle('cart-open');
        
        window.addToCart = (name, price) => {
            cart.push({ name, price });
            updateCart();
            toggleCart();
        };

        function updateCart() {
            const container = document.getElementById('cart-items');
            let total = 0; container.innerHTML = "";
            cart.forEach((item, i) => {
                total += item.price;
                container.innerHTML += `<div class="flex justify-between mb-4 bg-white/5 p-4 rounded-xl"><span>${item.name}</span><b>${item.price}€</b></div>`;
            });
            document.getElementById('cart-total').innerText = total + "€";
            document.getElementById('cart-count').innerText = cart.length;
            if(total > 0) initPayPal(total);
        }

        // AFFICHAGE DES PRODUITS
        onSnapshot(collection(db, "products"), snap => {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = "";
            snap.forEach(doc => {
                const p = doc.data();
                // Gestion intelligente de l'image (nouveau vs ancien format)
                const img = p.mainImage || (p.images && p.images[0]) || p.image;
                grid.innerHTML += `
                    <div class="product-card">
                        <img src="${img}" class="w-full h-72 object-cover rounded-3xl mb-4">
                        <h3 class="text-xl font-bold uppercase">${p.name}</h3>
                        <p class="text-gray-500 text-sm mt-2 italic flex-1">${p.description || ""}</p>
                        <div class="flex justify-between items-center mt-6">
                            <span class="text-2xl font-black text-blue-500">${p.price}€</span>
                            <button onclick="addToCart('${p.name}', ${p.price})" class="bg-white text-black px-4 py-2 rounded-xl font-bold text-xs uppercase">Prendre</button>
                        </div>
                    </div>`;
            });
        });

        function initPayPal(total) {
            document.getElementById('paypal-button-container').innerHTML = "";
            paypal.Buttons({
                createOrder: (data, actions) => actions.order.create({ purchase_units: [{ amount: { value: total } }] }),
                onApprove: async (data, actions) => {
                    await actions.order.capture();
                    await addDoc(collection(db, "orders"), {
                        client: document.getElementById('cust-name').value,
                        telephone: document.getElementById('cust-phone').value,
                        adresse: document.getElementById('cust-address').value,
                        articles: cart, total: total + "€", date: new Date().toISOString()
                    });
                    alert("Commande réussie !");
                    cart = []; updateCart(); toggleCart();
                }
            }).render('#paypal-button-container');
        }
    </script>
</body>
</html>
