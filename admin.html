<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | DropExpress</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #fff; font-family: sans-serif; }
        .card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 1.5rem; }
        .tab-btn.active { background: #2563eb; color: white; }
        input { background: #111 !important; border: 1px solid #222 !important; color: white !important; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <h1 class="text-3xl font-black italic uppercase">Admin <span class="text-blue-500">Panel</span></h1>
            <div class="flex bg-white/5 p-1 rounded-full border border-white/10">
                <button onclick="switchTab('orders')" id="btn-orders" class="tab-btn active px-6 py-2 rounded-full font-bold text-sm">Commandes</button>
                <button onclick="switchTab('products')" id="btn-products" class="tab-btn px-6 py-2 rounded-full font-bold text-sm">Produits</button>
            </div>
        </header>

        <div id="section-orders" class="space-y-6">
            <div id="orders-list" class="grid gap-6">Chargement...</div>
        </div>

        <div id="section-products" class="hidden space-y-8">
            <div class="card p-6 border-blue-500/30">
                <h2 class="text-xl font-bold mb-4">Ajouter un produit</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <input type="text" id="p-name" placeholder="Nom">
                    <input type="number" id="p-price" placeholder="Prix">
                    <input type="text" id="p-img" placeholder="URL Image">
                    <button onclick="addProduct()" class="md:col-span-3 bg-blue-600 py-3 rounded-xl font-bold">Publier</button>
                </div>
            </div>
            <div id="products-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>
    </div>

    <script type="module">
        import { db, collection, getDocs, addDoc, query, orderBy, deleteDoc, doc, onSnapshot } from "./firebase.js";
        
        const pass = prompt("Code Admin :");
        if(pass !== "AMIR2026") window.location.href="index.html";

        window.switchTab = (tab) => {
            document.getElementById('section-orders').classList.toggle('hidden', tab !== 'orders');
            document.getElementById('section-products').classList.toggle('hidden', tab !== 'products');
            document.getElementById('btn-orders').classList.toggle('active', tab === 'orders');
            document.getElementById('btn-products').classList.toggle('active', tab === 'products');
            if(tab === 'products') loadProducts();
        }

        onSnapshot(query(collection(db, "orders"), orderBy("date", "desc")), snap => {
            const container = document.getElementById('orders-list');
            container.innerHTML = "";
            snap.forEach(d => {
                const o = d.data();
                container.innerHTML += `
                <div class="card p-6 flex justify-between items-start">
                    <div>
                        <p class="text-blue-500 font-black text-xl">${o.client}</p>
                        <p class="text-gray-400 text-sm">📍 ${o.adresse}</p>
                        <p class="text-blue-400 text-sm font-bold">📞 ${o.telephone || "N/A"}</p>
                        <p class="text-xs text-gray-600 mt-2">${o.articles.map(a => a.name).join(', ')}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-2xl font-black">${o.total}</p>
                        <p class="text-[10px] text-gray-500 uppercase">${new Date(o.date).toLocaleDateString()}</p>
                    </div>
                </div>`;
            });
        });

        async function loadProducts() {
            const container = document.getElementById('products-list');
            const snap = await getDocs(collection(db, "products"));
            container.innerHTML = "";
            snap.forEach(d => {
                const p = d.data();
                container.innerHTML += `<div class="card p-4 flex justify-between items-center">
                    <div class="flex items-center gap-4"><img src="${p.image}" class="w-12 h-12 rounded-lg object-cover"><div><p class="font-bold text-sm">${p.name}</p><p class="text-blue-500 text-sm">${p.price}€</p></div></div>
                    <button onclick="deleteProduct('${d.id}')" class="text-red-500 text-xs bg-red-500/10 px-3 py-2 rounded-lg">Supprimer</button>
                </div>`;
            });
        }

        window.addProduct = async () => {
            await addDoc(collection(db, "products"), { 
                name: document.getElementById('p-name').value, 
                price: parseFloat(document.getElementById('p-price').value), 
                image: document.getElementById('p-img').value 
            });
            loadProducts();
        };

        window.deleteProduct = async (id) => { if(confirm("Supprimer ?")) { await deleteDoc(doc(db, "products", id)); loadProducts(); } };
    </script>
</body>
</html>
