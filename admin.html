<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Expert | DropExpress</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; padding: 20px; }
        .card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 2rem; padding: 20px; }
        input, textarea { background: #111 !important; border: 1px solid #222 !important; color: white !important; width: 100%; padding: 15px; border-radius: 15px; margin-bottom: 10px; outline: none; }
        .edit-mode { border-color: #2563eb; box-shadow: 0 0 15px rgba(37, 99, 235, 0.3); }
        .img-preview { width: 50px; height: 50px; object-fit: cover; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="max-w-2xl mx-auto">
        <h1 class="text-2xl font-black italic mb-8 uppercase text-blue-500">Admin Panel</h1>

        <div id="form-card" class="card mb-10 transition-all">
            <h2 id="form-title" class="font-bold mb-4 text-gray-400 uppercase text-xs">Ajouter un produit</h2>
            <input type="hidden" id="edit-id">
            <input type="text" id="p-name" placeholder="Nom du modèle">
            <input type="number" id="p-price" placeholder="Prix (€)">
            <textarea id="p-desc" placeholder="Description complète..."></textarea>
            <input type="file" id="p-files" multiple accept="image/*" class="text-xs mb-4">
            <div id="preview-container" class="flex flex-wrap gap-2 mb-4"></div>
            
            <div class="flex gap-2">
                <button onclick="handleSave()" id="btn-save" class="flex-1 bg-blue-600 py-4 rounded-xl font-black uppercase text-xs">Enregistrer</button>
                <button onclick="resetForm()" id="btn-cancel" class="hidden bg-gray-800 px-4 rounded-xl text-xs">Annuler</button>
            </div>
        </div>

        <div id="products-list" class="space-y-3"></div>
    </div>

    <script type="module">
        import { db, collection, addDoc, deleteDoc, doc, updateDoc, onSnapshot } from "./firebase.js";

        const pass = prompt("Code :");
        if(pass !== "AMIR2026") window.location.href="index.html";

        let selectedImages = [];

        document.getElementById('p-files').addEventListener('change', function(e) {
            const container = document.getElementById('preview-container');
            container.innerHTML = ""; selectedImages = [];
            Array.from(e.target.files).forEach(file => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    selectedImages.push(event.target.result);
                    container.innerHTML += `<img src="${event.target.result}" class="img-preview">`;
                };
                reader.readAsDataURL(file);
            });
        });

        window.handleSave = async () => {
            const id = document.getElementById('edit-id').value;
            const btn = document.getElementById('btn-save');
            const data = {
                name: document.getElementById('p-name').value,
                price: parseFloat(document.getElementById('p-price').value),
                description: document.getElementById('p-desc').value,
                date: new Date().toISOString()
            };

            if(selectedImages.length > 0) {
                data.images = selectedImages;
                data.mainImage = selectedImages[0];
            }

            btn.disabled = true; btn.innerText = "Chargement...";

            try {
                if(id) { await updateDoc(doc(db, "products", id), data); alert("Modifié !"); }
                else { await addDoc(collection(db, "products"), data); alert("Ajouté !"); }
                location.reload();
            } catch(e) { alert(e.message); btn.disabled = false; }
        };

        window.editProduct = (id, name, price, desc) => {
            document.getElementById('edit-id').value = id;
            document.getElementById('p-name').value = name;
            document.getElementById('p-price').value = price;
            document.getElementById('p-desc').value = desc;
            document.getElementById('form-card').classList.add('edit-mode');
            document.getElementById('form-title').innerText = "Modification en cours";
            document.getElementById('btn-cancel').classList.remove('hidden');
            window.scrollTo(0,0);
        };

        window.resetForm = () => location.reload();

        onSnapshot(collection(db, "products"), snap => {
            const list = document.getElementById('products-list'); list.innerHTML = "";
            snap.forEach(d => {
                const p = d.data();
                const img = p.mainImage || (p.images && p.images[0]) || p.image;
                list.innerHTML += `
                <div class="card flex justify-between items-center py-3">
                    <div class="flex items-center gap-4 cursor-pointer" onclick="editProduct('${d.id}', '${p.name.replace(/'/g, "\\'")}', ${p.price}, '${(p.description || "").replace(/'/g, "\\'").replace(/\n/g, " ")}')">
                        <img src="${img}" class="w-10 h-10 rounded-lg object-cover">
                        <div><p class="font-bold text-[10px] uppercase">${p.name}</p><p class="text-blue-500">${p.price}€</p></div>
                    </div>
                    <button onclick="deleteP('${d.id}')" class="text-red-500 text-[10px] font-bold">SUPPR</button>
                </div>`;
            });
        });

        window.deleteP = async (id) => { if(confirm("Supprimer ?")) await deleteDoc(doc(db, "products", id)); };
    </script>
</body>
</html>
