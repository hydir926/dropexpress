<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin DropExpress</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; padding: 15px; }
        .card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 1.5rem; padding: 20px; }
        input, textarea { background: #111 !important; border: 1px solid #222 !important; color: white !important; width: 100%; padding: 12px; border-radius: 10px; margin-bottom: 10px; outline: none; font-size: 14px; }
        .img-preview { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; border: 1px solid #333; }
        .btn-blue { background: #2563eb; width: 100%; padding: 15px; border-radius: 12px; font-weight: 800; text-transform: uppercase; font-size: 12px; transition: 0.3s; }
        .btn-blue:disabled { background: #1e3a8a; opacity: 0.7; }
    </style>
</head>
<body>
    <div class="max-w-xl mx-auto">
        <h1 class="text-xl font-black italic mb-6 text-blue-500 uppercase italic">Admin Panel</h1>

        <div id="form-container" class="card mb-8">
            <h2 id="form-title" class="text-[10px] font-bold text-gray-500 uppercase mb-4 tracking-widest">Ajouter / Modifier</h2>
            <input type="hidden" id="edit-id">
            <input type="text" id="p-name" placeholder="Nom du produit">
            <input type="number" id="p-price" placeholder="Prix (€)">
            <textarea id="p-desc" placeholder="Description..." rows="3"></textarea>
            
            <label class="block mb-2 text-[10px] font-bold text-blue-500 uppercase">Photos (1 ou plusieurs)</label>
            <input type="file" id="p-files" multiple accept="image/*" class="text-xs">
            
            <div id="preview-container" class="flex flex-wrap gap-2 mb-6"></div>
            
            <button onclick="saveData()" id="btn-save" class="btn-blue">Publier l'article</button>
            <button onclick="location.reload()" id="btn-cancel" class="hidden w-full mt-2 text-[10px] font-bold text-gray-500 uppercase">Annuler la modification</button>
        </div>

        <div id="products-list" class="space-y-3">
            <p class="text-center text-gray-700 text-xs">Chargement de la liste...</p>
        </div>
    </div>

    <script type="module">
        import { db, collection, addDoc, deleteDoc, doc, updateDoc, onSnapshot, query, orderBy } from "./firebase.js";

        const pass = prompt("Mot de passe admin :");
        if(pass !== "AMIR2026") window.location.href="index.html";

        let imagesBase64 = [];

        // Compression d'image automatique pour Android
        const compress = async (base64) => {
            return new Promise(resolve => {
                const img = new Image();
                img.src = base64;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const scale = 600 / img.width;
                    canvas.width = 600;
                    canvas.height = img.height * scale;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    resolve(canvas.toDataURL('image/jpeg', 0.6));
                };
            });
        };

        // Gestion des fichiers
        document.getElementById('p-files').addEventListener('change', async (e) => {
            const container = document.getElementById('preview-container');
            container.innerHTML = "<span class='text-xs animate-pulse'>Traitement...</span>";
            imagesBase64 = [];
            for (const file of e.target.files) {
                const reader = new FileReader();
                const raw = await new Promise(r => { reader.onload = (ev) => r(ev.target.result); reader.readAsDataURL(file); });
                const compressed = await compress(raw);
                imagesBase64.push(compressed);
            }
            container.innerHTML = imagesBase64.map(src => `<img src="${src}" class="img-preview">`).join('');
        });

        // SAUVEGARDE
        window.saveData = async () => {
            const btn = document.getElementById('btn-save');
            const id = document.getElementById('edit-id').value;
            const name = document.getElementById('p-name').value;
            const price = parseFloat(document.getElementById('p-price').value);
            const desc = document.getElementById('p-desc').value;

            if(!name || !price) return alert("Nom et prix requis !");
            
            btn.disabled = true;
            btn.innerText = "ENVOI EN COURS...";

            const payload = { name, price, description: desc, date: new Date().toISOString() };
            if(imagesBase64.length > 0) {
                payload.images = imagesBase64;
                payload.mainImage = imagesBase64[0];
            }

            try {
                if(id) {
                    await updateDoc(doc(db, "products", id), payload);
                } else {
                    if(imagesBase64.length === 0) throw new Error("Ajoute au moins une photo !");
                    await addDoc(collection(db, "products"), payload);
                }
                alert("✅ Réussi !");
                location.reload();
            } catch (err) {
                alert("Erreur : " + err.message);
                btn.disabled = false;
                btn.innerText = "RÉESSAYER";
            }
        };

        // AFFICHAGE LISTE
        onSnapshot(query(collection(db, "products"), orderBy("date", "desc")), snap => {
            const list = document.getElementById('products-list');
            list.innerHTML = "";
            snap.forEach(d => {
                const p = d.data();
                const img = p.mainImage || (p.images && p.images[0]) || p.image;
                list.innerHTML += `
                <div class="card flex justify-between items-center py-3 mb-2">
                    <div class="flex items-center gap-3 cursor-pointer" onclick="editMode('${d.id}', '${p.name.replace(/'/g, "\\'")}', ${p.price}, '${(p.description || "").replace(/'/g, "\\'").replace(/\n/g, " ")}')">
                        <img src="${img}" class="w-12 h-12 rounded-lg object-cover">
                        <div>
                            <p class="font-bold text-[10px] uppercase">${p.name}</p>
                            <p class="text-blue-500 font-bold text-[10px]">${p.price}€</p>
                        </div>
                    </div>
                    <button onclick="deleteDoc(doc(db, 'products', '${d.id}'))" class="text-red-500 text-[10px] font-bold">SUPPR</button>
                </div>`;
            });
        });

        window.editMode = (id, name, price, desc) => {
            document.getElementById('edit-id').value = id;
            document.getElementById('p-name').value = name;
            document.getElementById('p-price').value = price;
            document.getElementById('p-desc').value = desc;
            document.getElementById
