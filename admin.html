<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | DropExpress</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; }
        .card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 2rem; }
        input, textarea { background: #111 !important; border: 1px solid #222 !important; color: white !important; width: 100%; padding: 15px; border-radius: 15px; outline: none; }
        .tab-btn.active { background: #2563eb; color: white; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-black italic uppercase">Admin <span class="text-blue-500">Panel</span></h1>
            <div class="flex bg-white/5 p-1 rounded-full border border-white/10">
                <button onclick="switchTab('orders')" id="btn-orders" class="tab-btn active px-6 py-2 rounded-full font-bold text-xs">Commandes</button>
                <button onclick="switchTab('products')" id="btn-products" class="tab-btn px-6 py-2 rounded-full font-bold text-xs">Produits</button>
            </div>
        </header>

        <div id="section-products" class="space-y-6">
            <div class="card p-6 border-blue-500/20">
                <h2 class="text-lg font-bold mb-4 italic">Ajouter une pépite</h2>
                <div class="space-y-4">
                    <input type="text" id="p-name" placeholder="Nom du modèle">
                    <input type="number" id="p-price" placeholder="Prix (€)">
                    <textarea id="p-desc" placeholder="Description détaillée..." class="h-24"></textarea>
                    <div>
                        <p class="text-[10px] font-bold text-gray-500 uppercase mb-2 ml-1">Photo du produit</p>
                        <input type="file" id="p-file" class="text-xs border-none">
                    </div>
                    <button onclick="addProduct()" id="btn-add" class="w-full bg-blue-600 py-4 rounded-2xl font-black uppercase text-xs tracking-widest">Mettre en ligne</button>
                </div>
            </div>
            <div id="products-list" class="grid gap-4"></div>
        </div>

        <div id="section-orders" class="hidden space-y-4">
            <div id="orders-list" class="grid gap-4"></div>
        </div>
    </div>

    <script type="module">
        import { db, storage, collection, addDoc, deleteDoc, doc, onSnapshot, ref, uploadBytes, getDownloadURL, query, orderBy } from "./firebase.js";
        
        const pass = prompt("Accès Admin :");
        if(pass !== "AMIR2026") window.location.href="index.html";

        window.switchTab = (tab) => {
            document.getElementById('section-orders').classList.toggle('hidden', tab !== 'orders');
            document.getElementById('section-products').classList.toggle('hidden', tab !== 'products');
            document.getElementById('btn-orders').classList.toggle('active', tab === 'orders');
            document.getElementById('btn-products').classList.toggle('active', tab === 'products');
        };

        window.addProduct = async () => {
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            const desc = document.getElementById('p-desc').value;
            const file = document.getElementById('p-file').files[0];
            const btn = document.getElementById('btn-add');

            if(!name || !price || !desc || !file) return alert("Complète tous les champs !");
            btn.innerText = "CHARGEMENT..."; btn.disabled = true;

            try {
                const sRef = ref(storage, `products/${Date.now()}_${file.name}`);
                await uploadBytes(sRef, file);
                const url = await getDownloadURL(sRef);

                await addDoc(collection(db, "products"), {
                    name, price: parseFloat(price), description: desc, image: url, date: new Date().toISOString()
                });
                alert("Produit ajouté !"); location.reload();
            } catch(e) { alert(e.message); btn.disabled = false; btn.innerText = "METTRE EN LIGNE"; }
        };

        onSnapshot(collection(db, "products"), snap => {
            const list = document.getElementById('products-list'); list.innerHTML = "";
            snap.forEach(d => {
                const p = d.data();
                list.innerHTML += `<div class="card p-4 flex justify-between items-center border-white/5">
                    <div class="flex items-center gap-4"><img src="${p.image}" class="w-12 h-12 rounded-xl object-cover"><div><p class="font-bold text-xs uppercase">${p.name}</p><p class="text-blue-500 text-sm font-black">${p.price}€</p></div></div>
                    <button onclick="deleteP('${d.id}')" class="text-red-500 text-[10px] font-bold bg-red-500/10 px-4 py-2 rounded-lg">Supprimer</button>
                </div>`;
            });
        });

        window.deleteP = async (id) => { if(confirm("Supprimer ?")) await deleteDoc(doc(db, "products", id)); };

        onSnapshot(query(collection(db, "orders"), orderBy("date", "desc")), snap => {
            const list = document.getElementById('orders-list'); list.innerHTML = "";
            snap.forEach(d => {
                const o = d.data();
                list.innerHTML += `<div class="card p-5 border-white/5"><div class="flex justify-between mb-2"><p class="font-black text-blue-500 text-lg uppercase">${o.client}</p><p class="font-black">${o.total}</p></div>
                <p class="text-gray-400 text-sm italic">📍 ${o.adresse}</p><p class="text-blue-400 font-bold text-xs">📞 ${o.telephone || 'N/A'}</p></div>`;
            });
        });
    </script>
</body>
</html>
