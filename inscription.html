<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DropExpress | Inscription</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #000; color: #fff; }
        .input-field { background: #111; border: 1px solid #222; color: white; width: 100%; padding: 15px; border-radius: 12px; margin-bottom: 20px; outline: none; transition: 0.3s; }
        .input-field:focus { border-color: #2563eb; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">
    <div class="max-w-md w-full bg-[#0a0a0a] p-8 rounded-[2rem] border border-white/5 shadow-2xl">
        <h1 class="text-3xl font-black italic mb-2 uppercase text-center">DROP<span class="text-blue-500">EXPRESS</span></h1>
        <p class="text-gray-500 text-center mb-8 text-sm font-bold uppercase tracking-widest">Créer un compte</p>
        
        <form id="register-form">
            <input type="email" id="reg-email" placeholder="Adresse Email" class="input-field" required>
            <input type="password" id="reg-pass" placeholder="Mot de passe (6 caractères min.)" class="input-field" required>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-xl font-bold text-lg transition shadow-lg shadow-blue-600/20">
                S'inscrire
            </button>
        </form>
        
        <p class="text-center text-gray-500 mt-6 text-sm">
            Déjà client ? <a href="connexion.html" class="text-blue-500 font-bold">Se connecter</a>
        </p>
    </div>

    <script type="module">
        import { auth, createUserWithEmailAndPassword } from "./firebase.js";

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;

            try {
                await createUserWithEmailAndPassword(auth, email, pass);
                alert("Bienvenue chez DropExpress ! Votre compte a été créé.");
                window.location.href = "index.html";
            } catch (error) {
                if (error.code === 'auth/email-already-in-use') {
                    alert("Cet email est déjà utilisé.");
                } else if (error.code === 'auth/weak-password') {
                    alert("Le mot de passe est trop court.");
                } else {
                    alert("Erreur : " + error.message);
                }
            }
        });
    </script>
</body>
</html>
