<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription | DropExpress</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #000; color: #fff; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .auth-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 2.5rem; padding: 2.5rem; width: 100%; max-width: 400px; }
        input { background: #111 !important; border: 1px solid #222 !important; color: white !important; width: 100%; padding: 15px; border-radius: 14px; margin-bottom: 12px; outline: none; }
        .btn-blue { background: #2563eb; width: 100%; padding: 16px; border-radius: 14px; font-weight: 800; text-transform: uppercase; font-size: 12px; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h1 class="text-2xl font-black italic uppercase text-center mb-8 tracking-tighter">INSCRIPTION</h1>
        <input type="email" id="reg-email" placeholder="Email">
        <input type="password" id="reg-pass" placeholder="Mot de passe">
        <button onclick="register()" id="btn-reg" class="btn-blue">Créer mon compte</button>
        <p class="text-center mt-6 text-[11px] text-gray-500 uppercase">
            Déjà un compte ? <a href="connexion.html" class="text-blue-500 font-bold">Se connecter</a>
        </p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAs_xRDDAUjh_AemBZFBDCKQ9QXTNWuJ00",
            authDomain: "dropexpress-ba171.firebaseapp.com",
            projectId: "dropexpress-ba171",
            storageBucket: "dropexpress-ba171.firebasestorage.app",
            appId: "1:1070163070918:web:2c3e26ad6ea0688cb4acc7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.register = async () => {
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;
            const btn = document.getElementById('btn-reg');
            try {
                btn.innerText = "CRÉATION...";
                await createUserWithEmailAndPassword(auth, email, pass);
                window.location.href = "index.html";
            } catch (err) { alert("Erreur : " + err.message); btn.innerText = "CRÉER MON COMPTE"; }
        };
    </script>
</body>
</html>
